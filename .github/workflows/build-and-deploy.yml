name: Build and Deploy

on:
  push:
    branches:
      - main
      - release
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (windows only)
        if: matrix.platform == 'windows-latest'
        run: |
          choco install webview2 --yes

      - name: install frontend dependencies
        run: |
          cd kasugai
          npm install

      - name: build Tauri app
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: |
          cd kasugai
          npm run tauri build -- ${{ matrix.args }}

      - name: prepare upload artifacts
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path download
          Copy-Item kasugai\src-tauri\target\release\kasugai.exe download\kasugai.exe
          Compress-Archive -Path download\kasugai.exe -DestinationPath download\kasugai.exe.zip
          
          # 署名ファイルがあればコピー
          $sigPath = "kasugai\src-tauri\target\release\bundle\msi\*.sig"
          if (Test-Path $sigPath) {
            Copy-Item $sigPath download\
          }

      - name: create updater json
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $version = Select-String -Path "kasugai\src-tauri\tauri.conf.json" -Pattern '"version":\s*"([^"]+)"' | ForEach-Object { $_.Matches.Groups[1].Value }
          $date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          
          # 署名ファイルの内容を取得
          $signature = ""
          $sigFiles = Get-ChildItem "download\*.sig" -ErrorAction SilentlyContinue
          if ($sigFiles -and $sigFiles.Count -gt 0) {
            $signature = Get-Content $sigFiles[0].FullName -Raw
          }
          
          $json = @{
            version = $version
            notes = "Kasugai バージョン $version`n`n- 最新の更新内容"
            pub_date = $date
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature.Trim()
                url = "https://yamamoto-ryuzo.github.io/kasugai/download/kasugai.exe.zip"
              }
            }
          } | ConvertTo-Json -Depth 10
          
          $json | Out-File -FilePath "download\latest.json" -Encoding utf8

      - name: upload to GitHub Pages
        if: matrix.platform == 'windows-latest'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./download
          force_orphan: true