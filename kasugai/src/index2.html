<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pane 2 - Center View</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0fdf4;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        h1 {
            color: #15803d;
            font-size: 20px;
            margin-top: 0;
            border-bottom: 2px solid #22c55e;
            padding-bottom: 10px;
        }
        .badge {
            display: inline-block;
            background-color: #22c55e;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 15px;
            align-self: flex-start;
        }
        p {
            line-height: 1.6;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .interactive-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-grow: 1;
        }
        textarea {
            width: 100%;
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-family: monospace;
            font-size: 14px;
            resize: none;
            box-sizing: border-box;
        }
        textarea:focus {
            outline: none;
            border-color: #22c55e;
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
        }
        .btn {
            background-color: #22c55e;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            text-align: center;
        }
        .btn:hover {
            background-color: #16a34a;
        }
        .status-msg {
            font-size: 12px;
            color: #64748b;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="badge">画面 2 / Center View</span>
        <h1>インタラクティブ・エディタ</h1>
        <p>この画面は完全に独立したエディタ（メモ帳）です。ここに入力されたテキストは、メモリやローカルストレージに保持できます。</p>
        
        <div class="interactive-section">
            <textarea id="memo" placeholder="ここに自由にメモを入力してください..."></textarea>
            <button class="btn" onclick="saveMemo()">ローカルに保存</button>
            <div id="status" class="status-msg"></div>
        </div>
    </div>

    <script>
        // ロード時にメモを復元
        window.onload = function() {
            const saved = localStorage.getItem("kasugai_memo");
            if (saved) {
                document.getElementById("memo").value = saved;
            }
        };

        function saveMemo() {
            const text = document.getElementById("memo").value;
            localStorage.setItem("kasugai_memo", text);
            const status = document.getElementById("status");
            status.textContent = "保存しました！ (" + new Date().toLocaleTimeString() + ")";
            setTimeout(() => {
                status.textContent = "";
            }, 3000);
        }
    </script>
</body>
</html>
