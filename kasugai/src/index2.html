<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pane 2 - Center View</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0fdf4;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }
        .header-tabs {
            height: 50px;
            background-color: #ffffff;
            border-bottom: 1px solid #cbd5e1;
            display: flex;
            align-items: center;
            padding: 0 10px;
            box-sizing: border-box;
            overflow-x: auto;
            white-space: nowrap;
            min-width: 280px;
            flex-shrink: 0;
        }
        .container {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin: 10px;
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: auto;
            min-width: 280px;
            min-height: 0;
        }
        h1 {
            color: #15803d;
            font-size: 20px;
            margin-top: 0;
            border-bottom: 2px solid #22c55e;
            padding-bottom: 10px;
        }
        .badge {
            display: inline-block;
            background-color: #22c55e;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 15px;
            align-self: flex-start;
        }
        p {
            line-height: 1.6;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .interactive-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-grow: 1;
        }
        textarea {
            width: 100%;
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-family: monospace;
            font-size: 14px;
            resize: none;
            box-sizing: border-box;
        }
        textarea:focus {
            outline: none;
            border-color: #22c55e;
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
        }
        .btn {
            background-color: #22c55e;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            text-align: center;
        }
        .btn:hover {
            background-color: #16a34a;
        }
        .btn-danger {
            background-color: #ef4444 !important;
        }
        .btn-danger:hover {
            background-color: #dc2626 !important;
        }
        .status-msg {
            font-size: 12px;
            color: #64748b;
            margin-top: 5px;
        }
        /* タブ用のスタイル */
        .tabs {
            display: flex;
            gap: 5px;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: bold;
            color: #64748b;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .tab-btn:hover {
            background-color: #f1f5f9;
            color: #1e293b;
        }
        .tab-btn.active {
            background-color: #22c55e;
            color: white;
        }
        .tab-btn.detached {
            background-color: #cbd5e1;
            color: #64748b;
            border: 1px dashed #64748b;
            cursor: default;
        }
        .tab-btn.detached:hover {
            background-color: #94a3b8;
            color: #ffffff;
            cursor: pointer;
        }

    </style>
</head>
<body>
    <div class="header-tabs">
        <div class="tabs">
            <button class="tab-btn active" id="tab-settings" onclick="switchTab('settings')" oncontextmenu="handleTabRightClick(event, 'settings', '⚙️ システム設定')">⚙️ システム設定</button>
            <button class="tab-btn" id="tab-box" onclick="switchTab('box')" oncontextmenu="handleTabRightClick(event, 'box', '📦 BOX')">📦 BOX</button>
            <button class="tab-btn" id="tab-google" onclick="switchTab('google')" oncontextmenu="handleTabRightClick(event, 'google', '🗺️ Google Map')">🗺️ Google Map</button>
            <button class="tab-btn" id="tab-googleearth" onclick="switchTab('googleearth')" oncontextmenu="handleTabRightClick(event, 'googleearth', '🌍 Google Earth')">🌍 Google Earth</button>
            <button class="tab-btn" id="tab-yahoo" onclick="switchTab('yahoo')" oncontextmenu="handleTabRightClick(event, 'yahoo', '🗾 Yahoo Map')">🗾 Yahoo Map</button>
            <button class="tab-btn" id="tab-cesium" onclick="switchTab('cesium')" oncontextmenu="handleTabRightClick(event, 'cesium', '🌌 CesiumJS')">🌌 CesiumJS</button>
            <button class="tab-btn" id="tab-reearth" onclick="switchTab('reearth')" oncontextmenu="handleTabRightClick(event, 'reearth', '🌐 Re:Earth')">🌐 Re:Earth</button>
        </div>
    </div>

    <div class="container">
        <h1 id="view-title">システム設定</h1>

        <div id="content-settings" class="tab-content">
            <p>システムの動作に関する設定を行います。変更は即座に反映されます。</p>
            <div class="interactive-section" style="gap: 15px;">
                <!-- BOX 設定セクション -->
                <div>
                    <h3 style="color: #15803d; font-size: 16px; margin-top: 0; margin-bottom: 10px;">📦 BOX 代理オートログイン設定</h3>
                    <div style="display: flex; flex-direction: column; gap: 10px;">
                        <div>
                            <label for="box-email-input" style="font-weight: bold; font-size: 14px; color: #15803d; margin-bottom: 5px; display: block;">メールアドレス (ログインID)</label>
                            <input type="email" id="box-email-input" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; box-sizing: border-box;" placeholder="user@example.com">
                        </div>
                        <div>
                            <label for="box-password-input" style="font-weight: bold; font-size: 14px; color: #15803d; margin-bottom: 5px; display: block;">パスワード</label>
                            <input type="password" id="box-password-input" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; box-sizing: border-box;" placeholder="パスワードを入力">
                        </div>
                    </div>
                </div>

                <!-- 区切り線 -->
                <hr style="border: 0; border-top: 2px solid #22c55e; margin: 10px 0; opacity: 0.3;">

                <!-- Re:Earth 設定セクション -->
                <div>
                    <h3 style="color: #15803d; font-size: 16px; margin-top: 0; margin-bottom: 10px;">🌐 Re:Earth 設定</h3>
                    <div style="display: flex; flex-direction: column; gap: 15px;">
                        <div>
                            <label for="reearth-url-input" style="font-weight: bold; font-size: 14px; color: #15803d; margin-bottom: 5px; display: block;">Re:Earth 接続URL</label>
                            <input type="text" id="reearth-url-input" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; box-sizing: border-box;" placeholder="https://example.visualizer.reearth.io/">
                        </div>

                        <div>
                            <label style="font-weight: bold; font-size: 14px; color: #15803d; margin-bottom: 5px; display: block;">Re:Earth 代理オートログイン設定</label>
                            <div style="display: flex; flex-direction: column; gap: 10px; padding-left: 10px; border-left: 2px solid #f0fdf4;">
                                <div>
                                    <label for="reearth-email-input" style="font-weight: bold; font-size: 13px; color: #15803d; margin-bottom: 5px; display: block;">メールアドレス (ログインID)</label>
                                    <input type="email" id="reearth-email-input" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; box-sizing: border-box;" placeholder="reearth-user@example.com">
                                </div>
                                <div>
                                    <label for="reearth-password-input" style="font-weight: bold; font-size: 13px; color: #15803d; margin-bottom: 5px; display: block;">パスワード</label>
                                    <input type="password" id="reearth-password-input" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; box-sizing: border-box;" placeholder="パスワードを入力">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 区切り線 -->
                <hr style="border: 0; border-top: 2px solid #22c55e; margin: 10px 0; opacity: 0.3;">

                <!-- Gemini 設定セクション -->
                <div>
                    <h3 style="color: #15803d; font-size: 16px; margin-top: 0; margin-bottom: 10px;">✨ Gemini AI 設定</h3>
                    <div style="display: flex; flex-direction: column; gap: 10px;">
                        <div>
                            <label for="gemini-api-key-input" style="font-weight: bold; font-size: 14px; color: #15803d; margin-bottom: 5px; display: block;">Gemini APIキー</label>
                            <input type="password" id="gemini-api-key-input" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; box-sizing: border-box;" placeholder="AIzaSy...">
                        </div>
                    </div>
                </div>

                <!-- 区切り線 -->
                <hr style="border: 0; border-top: 2px solid #22c55e; margin: 10px 0; opacity: 0.3;">

                <!-- Cesium 設定セクション -->
                <div>
                    <h3 style="color: #15803d; font-size: 16px; margin-top: 0; margin-bottom: 10px;">🌌 Cesium 設定</h3>
                    <div style="display: flex; flex-direction: column; gap: 10px;">
                        <div>
                            <label for="cesium-ion-token-input" style="font-weight: bold; font-size: 14px; color: #15803d; margin-bottom: 5px; display: block;">Cesium Ion Access Token</label>
                            <input type="password" id="cesium-ion-token-input" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; box-sizing: border-box;" placeholder="eyJhbGciOi...">
                        </div>
                    </div>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button class="btn" onclick="saveAllSettings()" style="flex: 1;">設定をすべて保存</button>
                    <button class="btn btn-danger" onclick="resetAllSettings()" style="flex: 1;">設定を初期化</button>
                </div>
                <div id="settings-status" class="status-msg"></div>
            </div>
        </div>
    </div>

    <script>
        let detachedTabs = new Set();
        let lastRightClickTime = 0;
        let lastRightClickTabId = null;

        function handleTabRightClick(e, tabId, title) {
            e.preventDefault();
            if (tabId === 'settings') return; // システム設定は独立ウィンドウ化の対象外
            
            // 連続右ダブルクリック（Macなどの2タップ）の検知ロジック
            const now = Date.now();
            if (tabId === lastRightClickTabId && (now - lastRightClickTime) < 500) {
                // 右ダブルクリックが成立した場合、デタッチを起動
                detachTab(tabId, title);
                lastRightClickTime = 0;
            } else {
                lastRightClickTabId = tabId;
                lastRightClickTime = now;
            }
        }

        async function detachTab(tabId, title) {
            if (tabId === 'settings') return; // システム設定は独立ウィンドウ化の対象外
            if (window.__TAURI__ && window.__TAURI__.core) {
                const url = await getTabUrl(tabId);
                // WebviewのIDを正しく渡す (例: "pane2_box")
                const wvId = 'pane2_' + tabId;
                
                // 専用画面として独立ウィンドウを開く/フォーカスする
                await window.__TAURI__.core.invoke('detach_window', { 
                    label: wvId, 
                    url: url,
                    title: title || 'Kasugai Dedicated Window'
                });
                
                // Rust側にBounds再計算を促す
                await window.__TAURI__.core.invoke('update_splitter', { ratio1: -1, ratio2: -1 });

                // UI上も独立状態を反映
                detachedTabs.add(tabId);
                const btn = document.getElementById('tab-' + tabId);
                if (btn) btn.classList.add('detached');
            }
        }

        // --- スプリッターのドラッグ・リサイズ用中継処理 ---
        (function() {
            let isDragging = false;
            let activeSplitter = null;

            if (window.__TAURI__ && window.__TAURI__.event) {
                // 親がドラッグを開始したことを検知
                window.__TAURI__.event.listen('splitter_drag_start', (event) => {
                    isDragging = true;
                    activeSplitter = event.payload.activeSplitter;
                });

                // 親がドラッグを終了したことを検知
                window.__TAURI__.event.listen('splitter_drag_end', () => {
                    isDragging = false;
                    activeSplitter = null;
                });

                // ドラッグ中、マウスのグローバル座標を親に伝える
                window.addEventListener('mousemove', (e) => {
                    if (isDragging && activeSplitter) {
                        window.__TAURI__.event.emit('global_mousemove', {
                            screenX: e.screenX,
                            screenY: e.screenY
                        });
                    }
                });

                // ドラッグ中にこのペイン上でマウスを離した場合
                window.addEventListener('mouseup', () => {
                    if (isDragging) {
                        window.__TAURI__.event.emit('global_mouseup');
                    }
                });
            }
        })();

        async function getTabUrl(tabId) {
            if (tabId === 'settings') return window.location.origin + '/index2.html?settings=true';
            if (tabId === 'cesium') return window.location.origin + '/cesium.html';
            
            // Rust側の状態に合わせてタブ名を解決（box -> pane2_box 等）
            const tabNameToWebviewId = {
                'box': 'pane2_box',
                'reearth': 'pane2_reearth',
                'google': 'pane2_google',
                'googleearth': 'pane2_googleearth',
                'yahoo': 'pane2_yahoo'
            };

            if (window.__TAURI__ && window.__TAURI__.core && tabNameToWebviewId[tabId]) {
                try {
                    // 指定したタブ（サービス）を一時的にアクティブにしてURLを取得
                    await window.__TAURI__.core.invoke('switch_pane2_tab', { tab: tabId });
                    const url = await window.__TAURI__.core.invoke('get_pane2_url');
                    if (url && url !== 'about:blank' && url !== 'https://tauri.localhost/') {
                        return url;
                    }
                } catch(e) {}
            }

            // フォールバック：設定値またはデフォルトURL
            if (tabId === 'box') return 'https://app.box.com/';
            if (tabId === 'reearth') {
                const url = document.getElementById("reearth-url-input").value;
                return url.includes('://') ? url : 'https://' + url;
            }
            // Google Mapsの初期プリロード時に座標（東京駅）を明示して初期表示の遅延・現在地取得による灰色のままになる不具合を回避
            if (tabId === 'google') return 'https://www.google.com/maps/@35.681236,139.767125,15z';
            if (tabId === 'googleearth') return 'https://earth.google.com/web/@35.6849969,139.7554625,11.25354372a,4199.46208022d,35y,-9.98947684h,48.78890191t,359.99999999r/data=CgRCAggBOgMKATBCAggASg0I____________ARAA?hl=ja';
            if (tabId === 'yahoo') return 'https://map.yahoo.co.jp/';
            
            return window.location.href;
        }

        // タブ切り替え処理
        async function switchTab(tabName) {
            // UIのアクティブ状態の更新
            const tabs = ['settings', 'box', 'reearth', 'google', 'googleearth', 'yahoo', 'cesium'];
            tabs.forEach(t => {
                const el = document.getElementById('tab-' + t);
                if (el) el.classList.toggle('active', tabName === t);
            });

            const container = document.querySelector('.container');
            const title = document.getElementById('view-title');

            // ローカルコンテンツの表示切り替え
            const isLocal = (tabName === 'settings');
            document.getElementById('content-settings').style.display = tabName === 'settings' ? 'block' : 'none';

            if (tabName === 'settings') {
                title.textContent = 'システム設定';
                title.style.display = 'block';
                
                container.style.margin = '10px';
                container.style.padding = '20px';
                container.style.borderRadius = '8px';
                container.style.backgroundColor = '#ffffff';
                container.style.boxShadow = '0 4px 6px rgba(0, 0, 0, 0.1)';
            } else {
                title.textContent = '';
                title.style.display = 'none';
                container.style.backgroundColor = 'transparent';
                container.style.boxShadow = 'none';
            }

            // Rustバックエンドにタブ切り替え・ロードを指示
            if (window.__TAURI__ && window.__TAURI__.core) {
                if (isLocal) {
                    window.__TAURI__.core.invoke('switch_pane2_tab', { tab: 'default' });
                } else if (tabName === 'box') {
                    const email = document.getElementById("box-email-input")?.value || "";
                    const password = document.getElementById("box-password-input")?.value || "";
                    window.__TAURI__.core.invoke('open_box_in_pane', {
                        target: 'pane2',
                        url: 'https://app.box.com/',
                        creds: { email, password }
                    });
                } else if (tabName === 'reearth') {
                    const url = document.getElementById("reearth-url-input")?.value || "https://c-01kcwqbkykrk15apgxeqrvr6rv.visualizer.reearth.io/";
                    const email = document.getElementById("reearth-email-input")?.value || "";
                    const password = document.getElementById("reearth-password-input")?.value || "";
                    window.__TAURI__.core.invoke('open_reearth_in_pane', {
                        target: 'pane2',
                        url: url,
                        creds: { email, password }
                    });
                } else if (tabName === 'google') {
                    window.__TAURI__.core.invoke('switch_pane2_tab', { tab: 'google' });
                } else if (tabName === 'googleearth') {
                    window.__TAURI__.core.invoke('switch_pane2_tab', { tab: 'googleearth' });
                } else if (tabName === 'yahoo') {
                    window.__TAURI__.core.invoke('switch_pane2_tab', { tab: 'yahoo' });
                } else if (tabName === 'cesium') {
                    window.__TAURI__.core.invoke('switch_pane2_tab', { tab: 'cesium' });
                }
            }
        }

        // ロード時の初期化処理
        window.onload = async function() {
            // Re:Earth URLの復元
            const savedReearth = localStorage.getItem("reearth_url") || "https://c-01kcwqbkykrk15apgxeqrvr6rv.visualizer.reearth.io/";
            document.getElementById("reearth-url-input").value = savedReearth;

            // BOX資格情報の復元 (EmailはlocalStorage、PasswordはKeyringからセキュアに取得)
            const email = localStorage.getItem("box_email") || "";
            document.getElementById("box-email-input").value = email;
            
            if (email && window.__TAURI__ && window.__TAURI__.core) {
                try {
                    const password = await window.__TAURI__.core.invoke('get_credential', { service: 'Kasugai', username: email });
                    document.getElementById("box-password-input").value = password;
                } catch (e) {
                    console.warn("KeyringからのBOXパスワード取得に失敗しました。:", e);
                }
            }

            // Re:Earth資格情報の復元 (EmailはlocalStorage、PasswordはKeyringからセキュアに取得)
            const reearthEmail = localStorage.getItem("reearth_email") || "";
            document.getElementById("reearth-email-input").value = reearthEmail;

            if (reearthEmail && window.__TAURI__ && window.__TAURI__.core) {
                try {
                    const password = await window.__TAURI__.core.invoke('get_credential', { service: 'Kasugai_Reearth', username: reearthEmail });
                    document.getElementById("reearth-password-input").value = password;
                } catch (e) {
                    console.warn("KeyringからのRe:Earthパスワード取得に失敗しました。:", e);
                }
            }

            // Gemini APIキーの復元 (PasswordはKeyringからセキュアに取得)
            if (window.__TAURI__ && window.__TAURI__.core) {
                try {
                    const apiKey = await window.__TAURI__.core.invoke('get_credential', { service: 'Kasugai_Gemini', username: 'apikey' });
                    document.getElementById("gemini-api-key-input").value = apiKey;
                } catch (e) {
                    console.warn("KeyringからのGemini APIキー取得に失敗しました。:", e);
                }
            }

            // Cesium Ionトークンの復元 (PasswordはKeyringからセキュアに取得)
            if (window.__TAURI__ && window.__TAURI__.core) {
                try {
                    const cesiumToken = await window.__TAURI__.core.invoke('get_credential', { service: 'Kasugai_Cesium', username: 'ion_token' });
                    document.getElementById("cesium-ion-token-input").value = cesiumToken;
                } catch (e) {
                    console.warn("KeyringからのCesium Ionトークン取得に失敗しました。:", e);
                }
            }

            // デフォルトでシステム設定タブをアクティブにする
            switchTab('settings');
        };

        async function saveAllSettings() {
            // 1. Re:Earth URLの保存
            const url = document.getElementById("reearth-url-input").value.trim();
            if (!url) {
                alert("URLを入力してください。");
                return;
            }

            try {
                new URL(url);
            } catch (_) {
                alert("有効なURLを入力してください。（例: https://example.com）");
                return;
            }

            localStorage.setItem("reearth_url", url);

            // 2. BOX資格情報の保存 (Keyringを使用)
            const email = document.getElementById("box-email-input").value.trim();
            const password = document.getElementById("box-password-input").value;
            
            localStorage.setItem("box_email", email);

            if (window.__TAURI__ && window.__TAURI__.core) {
                try {
                    // パスワードをOSのKeyring（セキュアな資格情報ストア）へ保存
                    await window.__TAURI__.core.invoke('save_credential', { service: 'Kasugai', username: email, password: password });
                    console.log("BOXパスワードをKeyringにセキュアに保存しました。");
                } catch (e) {
                    console.error("Keyringへの保存に失敗しました。平文での一時保存を行います。:", e);
                }
            }

            // 3. Re:Earth資格情報の保存 (Keyringを使用)
            const rEmail = document.getElementById("reearth-email-input").value.trim();
            const rPassword = document.getElementById("reearth-password-input").value;

            localStorage.setItem("reearth_email", rEmail);

            if (window.__TAURI__ && window.__TAURI__.core) {
                try {
                    await window.__TAURI__.core.invoke('save_credential', { service: 'Kasugai_Reearth', username: rEmail, password: rPassword });
                    console.log("Re:EarthパスワードをKeyringにセキュアに保存しました。");
                } catch (e) {
                    console.error("Re:EarthのKeyring保存に失敗しました:", e);
                }
            }

            // 4. Gemini APIキーの保存 (Keyringを使用)
            const gApiKey = document.getElementById("gemini-api-key-input").value;
            if (window.__TAURI__ && window.__TAURI__.core) {
                try {
                    await window.__TAURI__.core.invoke('save_credential', { service: 'Kasugai_Gemini', username: 'apikey', password: gApiKey });
                    console.log("Gemini APIキーをKeyringにセキュアに保存しました。");
                } catch (e) {
                    console.error("Gemini APIキーのKeyring保存に失敗しました:", e);
                }
            }

            // 5. Cesium Ionトークンの保存 (Keyringを使用)
            const cToken = document.getElementById("cesium-ion-token-input").value;
            if (window.__TAURI__ && window.__TAURI__.core) {
                try {
                    await window.__TAURI__.core.invoke('save_credential', { service: 'Kasugai_Cesium', username: 'ion_token', password: cToken });
                    console.log("Cesium IonトークンをKeyringにセキュアに保存しました。");
                } catch (e) {
                    console.error("Cesium IonトークンのKeyring保存に失敗しました:", e);
                }
            }

            if (window.__TAURI__ && window.__TAURI__.event) {
                window.__TAURI__.event.emit('reearth_url_changed', { url: url });
                window.__TAURI__.event.emit('box_credentials_changed', { email: email, password: password });
                window.__TAURI__.event.emit('reearth_credentials_changed', { email: rEmail, password: rPassword });
                window.__TAURI__.event.emit('gemini_api_key_changed', { apiKey: gApiKey });
                window.__TAURI__.event.emit('cesium_token_changed', { token: cToken });
            }

            const status = document.getElementById("settings-status");
            status.textContent = "設定をすべてセキュアに保存しました！ (" + new Date().toLocaleTimeString() + ")";
            setTimeout(() => {
                status.textContent = "";
            }, 3000);
        }

        async function resetAllSettings() {
            if (!confirm("すべてのシステム設定を初期化し、セキュアストア(Keyring)からパスワードを完全に削除しますか？\nこの操作は取り消せません。")) {
                return;
            }

            const defaultReearthUrl = "https://c-01kcwqbkykrk15apgxeqrvr6rv.visualizer.reearth.io/";

            // 1. セキュアストア(Keyring)からの削除
            if (window.__TAURI__ && window.__TAURI__.core) {
                // BOX資格情報の削除
                const boxEmail = document.getElementById("box-email-input").value.trim() || localStorage.getItem("box_email") || "";
                if (boxEmail) {
                    try {
                        await window.__TAURI__.core.invoke('delete_credential', { service: 'Kasugai', username: boxEmail });
                        console.log("BOXパスワードをKeyringから削除しました。");
                    } catch (e) {
                        console.warn("KeyringからのBOXパスワード削除に失敗、または既に存在しません:", e);
                    }
                }

                // Re:Earth資格情報の削除
                const reearthEmail = document.getElementById("reearth-email-input").value.trim() || localStorage.getItem("reearth_email") || "";
                if (reearthEmail) {
                    try {
                        await window.__TAURI__.core.invoke('delete_credential', { service: 'Kasugai_Reearth', username: reearthEmail });
                        console.log("Re:EarthパスワードをKeyringから削除しました。");
                    } catch (e) {
                        console.warn("KeyringからのRe:Earthパスワード削除に失敗、または既に存在しません:", e);
                    }
                }

                // Gemini APIキーの削除
                try {
                    await window.__TAURI__.core.invoke('delete_credential', { service: 'Kasugai_Gemini', username: 'apikey' });
                    console.log("Gemini APIキーをKeyringから削除しました。");
                } catch (e) {
                    console.warn("KeyringからのGemini APIキー削除に失敗、または既に存在しません:", e);
                }

                // Cesium Ionトークンの削除
                try {
                    await window.__TAURI__.core.invoke('delete_credential', { service: 'Kasugai_Cesium', username: 'ion_token' });
                    console.log("Cesium IonトークンをKeyringから削除しました。");
                } catch (e) {
                    console.warn("KeyringからのCesium Ionトークン削除に失敗、または既に存在しません:", e);
                }
            }

            // 2. localStorageのクリア
            localStorage.removeItem("reearth_url");
            localStorage.removeItem("box_email");
            localStorage.removeItem("reearth_email");

            // 3. 入力項目の初期化
            document.getElementById("reearth-url-input").value = defaultReearthUrl;
            document.getElementById("box-email-input").value = "";
            document.getElementById("box-password-input").value = "";
            document.getElementById("reearth-email-input").value = "";
            document.getElementById("reearth-password-input").value = "";
            document.getElementById("gemini-api-key-input").value = "";
            document.getElementById("cesium-ion-token-input").value = "";

            // 4. 他のウィンドウ/コンポーネントへの変更イベント通知
            if (window.__TAURI__ && window.__TAURI__.event) {
                window.__TAURI__.event.emit('reearth_url_changed', { url: defaultReearthUrl });
                window.__TAURI__.event.emit('box_credentials_changed', { email: "", password: "" });
                window.__TAURI__.event.emit('reearth_credentials_changed', { email: "", password: "" });
                window.__TAURI__.event.emit('gemini_api_key_changed', { apiKey: "" });
                window.__TAURI__.event.emit('cesium_token_changed', { token: "" });
            }

            const status = document.getElementById("settings-status");
            status.textContent = "設定をすべて初期化しました。 (" + new Date().toLocaleTimeString() + ")";
            setTimeout(() => {
                status.textContent = "";
            }, 3000);
        }

        // --- イベントリスナー ---
        if (window.__TAURI__ && window.__TAURI__.event) {
            // ウィンドウが閉じられた際の復元通知
            window.__TAURI__.event.listen('window_restored', (event) => {
                const label = event.payload.label;
                if (label.startsWith('pane2_')) {
                    const tabId = label.replace('pane2_', '');
                    detachedTabs.delete(tabId);
                    const btn = document.getElementById('tab-' + tabId);
                    if (btn) btn.classList.remove('detached');
                }
            });
        }

    </script>
