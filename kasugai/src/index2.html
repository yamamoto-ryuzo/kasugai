<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pane 2 - Center View</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0fdf4;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }
        .header-tabs {
            height: 50px;
            background-color: #ffffff;
            border-bottom: 1px solid #cbd5e1;
            display: flex;
            align-items: center;
            padding: 0 10px;
            box-sizing: border-box;
            overflow-x: auto;
            white-space: nowrap;
            min-width: 280px;
            flex-shrink: 0;
        }
        .container {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin: 10px;
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: auto;
            min-width: 280px;
            min-height: 0;
        }
        h1 {
            color: #15803d;
            font-size: 20px;
            margin-top: 0;
            border-bottom: 2px solid #22c55e;
            padding-bottom: 10px;
        }
        .badge {
            display: inline-block;
            background-color: #22c55e;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 15px;
            align-self: flex-start;
        }
        p {
            line-height: 1.6;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .interactive-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-grow: 1;
        }
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-family: monospace;
            font-size: 14px;
            /* 初期表示はおよそ10行分、必要に応じて縦方向にリサイズ可能にする */
            resize: vertical;
            min-height: calc(1.4em * 10);
            max-height: 60vh;
            overflow: auto;
            box-sizing: border-box;
        }
        textarea:focus {
            outline: none;
            border-color: #22c55e;
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
        }
        .btn {
            background-color: #22c55e;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            text-align: center;
        }
        .btn:hover {
            background-color: #16a34a;
        }
        .btn-danger {
            background-color: #ef4444 !important;
        }
        .btn-danger:hover {
            background-color: #dc2626 !important;
        }
        .status-msg {
            font-size: 12px;
            color: #64748b;
            margin-top: 5px;
        }
        /* タブ用のスタイル */
        .tabs {
            display: flex;
            gap: 5px;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: bold;
            color: #64748b;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .tab-btn:hover {
            background-color: #f1f5f9;
            color: #1e293b;
        }
        .tab-btn.active {
            background-color: #22c55e;
            color: white;
        }
        .tab-btn.detached {
            background-color: #cbd5e1;
            color: #64748b;
            border: 1px dashed #64748b;
            cursor: default;
        }
        .tab-btn.detached:hover {
            background-color: #94a3b8;
            color: #ffffff;
            cursor: pointer;
        }

        /* 水平スプリッター（pane2 / pane4 間） — 垂直スプリッターと同じ見た目に整える */
        #hsplit {
            height: 8px;
            background-color: #334155;
            cursor: row-resize;
            margin: 0 10px;
            border-radius: 4px;
            z-index: 9999;
            transition: background-color 0.15s;
            box-sizing: border-box;
            display: block;
        }
        #hsplit:hover,
        #hsplit.dragging {
            background-color: #3b82f6; /* ホバー・ドラッグ時に青く光らせる */
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.8);
        }

    </style>
    <style>
        /* Re:Earth URL display controls */
        #reearth-url-display .url-btn {
            background: none;
            border: none;
            margin-left: 6px;
            cursor: pointer;
            font-size: 12px;
            color: #475569;
            padding: 4px 6px;
            border-radius: 4px;
        }
        #reearth-url-display .url-btn:hover {
            background: rgba(99,102,241,0.08);
        }
        #reearth-url-inner.expanded {
            white-space: normal !important;
            overflow: auto !important;
            max-height: 6em;
        }
    </style>
</head>
<body>
    <div class="header-tabs">
        <div class="tabs">
            <button class="tab-btn active" id="tab-settings" onclick="switchTab('settings')" oncontextmenu="handleTabRightClick(event, 'settings', '⚙️ システム設定')">⚙️ システム設定</button>
            <button class="tab-btn" id="tab-box" onclick="switchTab('box')" oncontextmenu="handleTabRightClick(event, 'box', '📦 BOX')">📦 BOX</button>

            <button class="tab-btn" id="tab-yahoo" onclick="switchTab('yahoo')" oncontextmenu="handleTabRightClick(event, 'yahoo', '🗾 Yahoo Map')">🗾 Yahoo Map</button>

            <div id="reearth-url-display" style="display:flex; align-items:center; align-self:center; height:100%; max-width:520px; margin-left:8px; padding:0 8px; line-height:1; font-size:12px; color:#475569;">
                <div id="reearth-url-inner" style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"> </div>
                <button id="reearth-copy-btn" class="url-btn" title="クリップボードにコピー">📋</button>
                <button id="reearth-open-btn" class="url-btn" title="外部で開く">🔗</button>
            </div>
        </div>
    </div>

                    <option value="">(選択してください)</option>
                                    </select>

                                </div>

    </div>

                <!-- BOX 設定 -->

    <div id="hsplit" title="Drag to resize pane4"></div>

    <script>
        let detachedTabs = new Set();
        let lastRightClickTime = 0;
        let lastRightClickTabId = null;

        function handleTabRightClick(e, tabId, title) {
            e.preventDefault();
            if (tabId === 'settings') return; // システム設定は独立ウィンドウ化の対象外
            
            // 連続右ダブルクリック（Macなどの2タップ）の検知ロジック
            const now = Date.now();
            if (tabId === lastRightClickTabId && (now - lastRightClickTime) < 500) {
                // 右ダブルクリックが成立した場合、デタッチを起動
                detachTab(tabId, title);
                lastRightClickTime = 0;
            } else {
                lastRightClickTabId = tabId;
                lastRightClickTime = now;
                
                // ネイティブコンテキストメニューを表示
                if (window.__TAURI__ && window.__TAURI__.core) {
                    window.__TAURI__.core.invoke('show_context_menu', {
                        x: e.screenX,
                        y: e.screenY,
                        tabId: tabId,
                        title: title
                    });
                }
            }
        }

        async function detachTab(tabId, title) {
            if (tabId === 'settings') return; // システム設定は独立ウィンドウ化の対象外
            if (window.__TAURI__ && window.__TAURI__.core) {
                const url = await getTabUrl(tabId);
                // WebviewのIDを正しく渡す (例: "pane2_box")
                const wvId = 'pane2_' + tabId;
                
                // 専用画面として独立ウィンドウを開く/フォーカスする
                await window.__TAURI__.core.invoke('detach_window', { 
                    label: wvId, 
                    url: url,
                    title: title || 'Kasugai Dedicated Window'
                });
                
                // Rust側にBounds再計算を促す
                await window.__TAURI__.core.invoke('update_splitter', { ratio1: -1, ratio2: -1 });

                // UI上も独立状態を反映
                detachedTabs.add(tabId);
                const btn = document.getElementById('tab-' + tabId);
                if (btn) btn.classList.add('detached');
            }
        }

        // --- スプリッターのドラッグ・リサイズ用中継処理 ---
        (function() {
            let isDragging = false;
            let activeSplitter = null;

            if (window.__TAURI__ && window.__TAURI__.event) {
                // 親がドラッグを開始したことを検知
                window.__TAURI__.event.listen('splitter_drag_start', (event) => {
                    isDragging = true;
                    activeSplitter = event.payload.activeSplitter;
                });

                // 親がドラッグを終了したことを検知
                window.__TAURI__.event.listen('splitter_drag_end', () => {
                    isDragging = false;
                    activeSplitter = null;
                });

                // ドラッグ中、マウスのグローバル座標を親に伝える
                window.addEventListener('mousemove', (e) => {
                    if (isDragging && activeSplitter) {
                        window.__TAURI__.event.emit('global_mousemove', {
                            screenX: e.screenX,
                            screenY: e.screenY
                        });
                    }
                }, { passive: true });

                // ドラッグ中にこのペイン上でマウスを離した場合
                window.addEventListener('mouseup', () => {
                    if (isDragging) {
                        window.__TAURI__.event.emit('global_mouseup');
                    }
                }, { passive: true });
            }
        })();

        async function getTabUrl(tabId) {
            if (tabId === 'settings') return window.location.origin + '/index2.html?settings=true';
            if (tabId === 'cesium') return window.location.origin + '/cesium.html';
            
            // Rust側の状態に合わせてタブ名を解決（box -> pane2_box 等）
            const tabNameToWebviewId = {
                'box': 'pane2_box',
                'reearth': 'pane2_reearth',
                'google': 'pane2_google',
                'googleearth': 'pane2_googleearth',
                'yahoo': 'pane2_yahoo'
            };

            if (window.__TAURI__ && window.__TAURI__.core && tabNameToWebviewId[tabId]) {
                try {
                    // 指定したタブ（サービス）を一時的にアクティブにしてURLを取得
                    await window.__TAURI__.core.invoke('switch_pane2_tab', { tab: tabId });
                    const url = await window.__TAURI__.core.invoke('get_pane2_url');
                    if (url && url !== 'about:blank' && url !== 'https://tauri.localhost/') {
                        return url;
                    }
                } catch(e) {}
            }

            // フォールバック：設定値またはデフォルトURL
            if (tabId === 'box') return 'https://app.box.com/';
            if (tabId === 'reearth') {
                const url = document.getElementById("reearth-url-input").value;
                return url.includes('://') ? url : 'https://' + url;
            }
            // Google Mapsの初期プリロード時に座標（東京駅）を明示して初期表示の遅延・現在地取得による灰色のままになる不具合を回避
            if (tabId === 'google') return 'https://www.google.com/maps/@35.681236,139.767125,15z';
            if (tabId === 'googleearth') return 'https://earth.google.com/web/@35.6849969,139.7554625,11.25354372a,4199.46208022d,35y,-9.98947684h,48.78890191t,359.99999999r/data=CgRCAggBOgMKATBCAggASg0I____________ARAA?hl=ja';
            if (tabId === 'yahoo') return 'https://map.yahoo.co.jp/';
            
            return window.location.href;
        }

        // タブ切り替え処理
        async function switchTab(tabName) {
            // UIのアクティブ状態の更新
            const tabs = ['settings', 'box', 'reearth', 'google', 'googleearth', 'yahoo', 'cesium'];
            tabs.forEach(t => {
                const el = document.getElementById('tab-' + t);
                if (el) el.classList.toggle('active', tabName === t);
            });

            const container = document.querySelector('.container');
            const title = document.getElementById('view-title');

            // ローカルコンテンツの表示切り替え
            const isLocal = (tabName === 'settings');
            document.getElementById('content-settings').style.display = tabName === 'settings' ? 'block' : 'none';

            if (tabName === 'settings') {
                title.textContent = 'システム設定';
                title.style.display = 'block';
                
                container.style.margin = '10px';
                container.style.padding = '20px';
                container.style.borderRadius = '8px';
                container.style.backgroundColor = '#ffffff';
                container.style.boxShadow = '0 4px 6px rgba(0, 0, 0, 0.1)';
            } else {
                title.textContent = '';
                title.style.display = 'none';
                container.style.backgroundColor = 'transparent';
                container.style.boxShadow = 'none';
            }

            // Rustバックエンドにタブ切り替え・ロードを指示
            if (window.__TAURI__ && window.__TAURI__.core) {
                if (isLocal) {
                    window.__TAURI__.core.invoke('switch_pane2_tab', { tab: 'default' });
                } else if (tabName === 'box') {
                    const email = document.getElementById("box-email-input")?.value || "";
                    const password = document.getElementById("box-password-input")?.value || "";
                    window.__TAURI__.core.invoke('open_box_in_pane', {
                        target: 'pane2',
                        url: 'https://app.box.com/',
                        creds: { email, password }
                    });
                } else if (tabName === 'reearth') {
                    const url = document.getElementById("reearth-url-input")?.value || "https://c-01kcwqbkykrk15apgxeqrvr6rv.visualizer.reearth.io/";
                    const email = document.getElementById("reearth-email-input")?.value || "";
                    const password = document.getElementById("reearth-password-input")?.value || "";
                    window.__TAURI__.core.invoke('open_reearth_in_pane', {
                        target: 'pane2',
                        url: url,
                        creds: { email, password }
                    });
                } else if (tabName === 'google') {
                    window.__TAURI__.core.invoke('switch_pane2_tab', { tab: 'google' });
                } else if (tabName === 'googleearth') {
                    window.__TAURI__.core.invoke('switch_pane2_tab', { tab: 'googleearth' });
                } else if (tabName === 'yahoo') {
                    window.__TAURI__.core.invoke('switch_pane2_tab', { tab: 'yahoo' });
                } else if (tabName === 'cesium') {
                    window.__TAURI__.core.invoke('switch_pane2_tab', { tab: 'cesium' });
                }
            }
            // Re:Earthタブの横に現在URLを反映
            try { updateReearthUrlDisplay(); } catch(e){}
        }

            content += '[kasugai]\n';

        function parseIni(text) {
            const lines = text.split(/\r?\n/);
            const out = {};
            for (let l of lines) {
                l = l.trim();
                if (!l) continue;
                if (l.startsWith(';') || l.startsWith('#')) continue;
                if (l.startsWith('[') && l.endsWith(']')) continue;
                const idx = l.indexOf('=');
                if (idx === -1) continue;
                let k = l.slice(0, idx).trim();
                let v = l.slice(idx+1).trim();
                if ((v.startsWith('"') && v.endsWith('"')) || (v.startsWith("'") && v.endsWith("'"))) {
                    v = v.slice(1, -1);
            }
                out[k] = v;
            }
            return out;
        }

                        if (status) { status.textContent = 'INI を適用しました: ' + selectedIni; setTimeout(()=> status.textContent = '', 3000); }
                    } catch (e) {
                        console.error('INI 読み込み失敗', e);
                        alert('INIの読み込みに失敗しました: ' + selectedIni);
                    }
                    return;
                }
                // else: fall through to normal reset
            }

            if (!confirm("すべてのシステム設定を初期化し、セキュアストア(Keyring)からパスワードを完全に削除しますか？\nこの操作は取り消せません。")) {
                return;
            }

            const defaultReearthUrl = "https://c-01kcwqbkykrk15apgxeqrvr6rv.visualizer.reearth.io/";

            // 1. セキュアストア(Keyring)からの削除
            if (window.__TAURI__ && window.__TAURI__.core) {
                // BOX資格情報の削除
                const boxEmail = document.getElementById("box-email-input").value.trim() || localStorage.getItem("box_email") || "";
                if (boxEmail) {
                    try {
                        await window.__TAURI__.core.invoke('delete_credential', { service: 'Kasugai', username: boxEmail });
                        console.log("BOXパスワードをKeyringから削除しました。");
                    } catch (e) {
                        console.warn("KeyringからのBOXパスワード削除に失敗、または既に存在しません:", e);
                    }
                }

                // Re:Earth資格情報の削除
                const reearthEmail = document.getElementById("reearth-email-input").value.trim() || localStorage.getItem("reearth_email") || "";
                if (reearthEmail) {
                    try {
                        await window.__TAURI__.core.invoke('delete_credential', { service: 'Kasugai_Reearth', username: reearthEmail });
                        console.log("Re:EarthパスワードをKeyringから削除しました。");
                    } catch (e) {
                        console.warn("KeyringからのRe:Earthパスワード削除に失敗、または既に存在しません:", e);
                    }
                }

                // Gemini APIキーの削除
                try {
                    await window.__TAURI__.core.invoke('delete_credential', { service: 'Kasugai_Gemini', username: 'apikey' });
                    console.log("Gemini APIキーをKeyringから削除しました。");
                } catch (e) {
                    console.warn("KeyringからのGemini APIキー削除に失敗、または既に存在しません:", e);
                }

                // Cesium Ionトークンの削除
                try {
                    await window.__TAURI__.core.invoke('delete_credential', { service: 'Kasugai_Cesium', username: 'ion_token' });
                    console.log("Cesium IonトークンをKeyringから削除しました。");
                } catch (e) {
                    console.warn("KeyringからのCesium Ionトークン削除に失敗、または既に存在しません:", e);
                }
            }

            // 2. localStorageのクリア
            localStorage.removeItem("reearth_url");
            localStorage.removeItem("box_email");
            localStorage.removeItem("reearth_email");
            localStorage.removeItem("platform_setting");

            // 3. 入力項目の初期化
            document.getElementById("reearth-url-input").value = defaultReearthUrl;
            document.getElementById("box-email-input").value = "";
            document.getElementById("box-password-input").value = "";
            document.getElementById("reearth-email-input").value = "";
            document.getElementById("reearth-password-input").value = "";
            document.getElementById("gemini-api-key-input").value = "";
            try { const sel = document.getElementById('gemini-provider-select'); if (sel) sel.value = 'google'; } catch(_) {}
            document.getElementById("cesium-ion-token-input").value = "";
            document.getElementById("platform-setting-input").value = "";

            // 4. 他のウィンドウ/コンポーネントへの変更イベント通知
            if (window.__TAURI__ && window.__TAURI__.event) {
                window.__TAURI__.event.emit('reearth_url_changed', { url: defaultReearthUrl });
                window.__TAURI__.event.emit('box_credentials_changed', { email: "", password: "" });
                window.__TAURI__.event.emit('reearth_credentials_changed', { email: "", password: "" });
                window.__TAURI__.event.emit('gemini_api_key_changed', { apiKey: "" });
                if (window.__TAURI__ && window.__TAURI__.event) window.__TAURI__.event.emit('gemini_provider_changed', { provider: 'google' });
                window.__TAURI__.event.emit('cesium_token_changed', { token: "" });
            }

            const status = document.getElementById("settings-status");
            status.textContent = "設定をすべて初期化しました。 (" + new Date().toLocaleTimeString() + ")";
            setTimeout(() => {
                status.textContent = "";
            }, 3000);
        }

        // --- イベントリスナー ---
        if (window.__TAURI__ && window.__TAURI__.event) {
            // ウィンドウが閉じられた際の復元通知
            window.__TAURI__.event.listen('window_restored', (event) => {
                const label = event.payload.label;
                if (label.startsWith('pane2_')) {
                    const tabId = label.replace('pane2_', '');
                    detachedTabs.delete(tabId);
                    const btn = document.getElementById('tab-' + tabId);
                    if (btn) btn.classList.remove('detached');
                }
            });
            // Re:Earth URL が設定で変更されたときに表示更新
            window.__TAURI__.event.listen('reearth_url_changed', (ev) => {
                try { updateReearthUrlDisplay(); } catch(e){}
            });
        }

        // pane4 用の水平スプリッター処理
        (function() {
            const header = document.querySelector('.header-tabs');
            const container = document.querySelector('.container');
            const hsplit = document.getElementById('hsplit');
            const headerH = header ? header.offsetHeight : 50;

            function applyPane4Ratio(ratio, notify=true) {
                const clamped = Math.min(Math.max(ratio, 0.05), 0.6);
                localStorage.setItem('pane4_ratio', String(clamped));
                const pane4_h = Math.round(window.innerHeight * clamped);
                // container の高さを調整（マージンとヘッダ領域を差し引く）
                const containerHeight = Math.max(window.innerHeight - pane4_h - headerH - 20, 120);
                if (container) container.style.height = containerHeight + 'px';
                if (notify && window.__TAURI__ && window.__TAURI__.core) {
                    try { window.__TAURI__.core.invoke('update_pane4_ratio', { ratio: clamped }); } catch(e){}
                }
            }

            // 初期値の復元
            window.addEventListener('DOMContentLoaded', () => {
                const stored = parseFloat(localStorage.getItem('pane4_ratio') || '0.2');
                applyPane4Ratio(isNaN(stored) ? 0.2 : stored, true);
            });

            // Rust 側からの比率更新を受け取って UI を復元する
            if (window.__TAURI__ && window.__TAURI__.event) {
                window.__TAURI__.event.listen('update_splitter_ui', (event) => {
                    try {
                        if (event.payload && typeof event.payload.pane4_ratio !== 'undefined') {
                            const p4 = Number(event.payload.pane4_ratio) || 0.0;
                            // フロント側の表示を更新（notify=false で Rust への再通知を防ぐ）
                            applyPane4Ratio(Math.min(Math.max(p4, 0.0), 1.0), false);
                        }
                    } catch (e) { /* ignore malformed payloads */ }
                });
            }

            // リサイズ時の再計算
            window.addEventListener('resize', () => {
                const stored = parseFloat(localStorage.getItem('pane4_ratio') || '0.2');
                applyPane4Ratio(isNaN(stored) ? 0.2 : stored, false);
            });

            // ドラッグ処理（pointer API + オーバーレイ + ゴースト線）：移動中は見た目だけ追従し、最終で高さを確定
            let dragging = false;
            let dragOverlay = null;
            let dragGhost = null;

            hsplit.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                dragging = true;
                document.body.style.userSelect = 'none';
                document.body.style.cursor = 'row-resize';
                if (hsplit) hsplit.classList.add('dragging');
                // 全画面オーバーレイを置いて iframe 等からイベントを奪う
                dragOverlay = document.createElement('div');
                Object.assign(dragOverlay.style, {
                    position: 'fixed', top: '0', left: '0', right: '0', bottom: '0',
                    cursor: 'row-resize', zIndex: '9998', background: 'transparent'
                });
                document.body.appendChild(dragOverlay);

                // ゴースト線（視覚フィードバック）
                dragGhost = document.createElement('div');
                Object.assign(dragGhost.style, {
                    position: 'fixed', left: '0', right: '0', height: '4px',
                    background: 'rgba(59,130,246,0.9)', zIndex: '9999', pointerEvents: 'none',
                    transform: 'translateY(0px)'
                });
                document.body.appendChild(dragGhost);

                try { hsplit.setPointerCapture(e.pointerId); } catch(_) {}
                if (window.__TAURI__ && window.__TAURI__.event) {
                    window.__TAURI__.event.emit('splitter_drag_start', { activeSplitter: 'hsplit', ratio1: 0.0, ratio2: 0.0 });
                }
            });

            let lastEmit = 0;
            const emitInterval = 30; // ms
            document.addEventListener('pointermove', (e) => {
                if (!dragging) return;
                const y = e.clientY;
                // ゴースト線を移動させるだけ（頻繁なレイアウト変更を避ける）
                if (dragGhost) dragGhost.style.transform = `translateY(${y - 2}px)`;
                const now = performance.now();
                if (window.__TAURI__ && window.__TAURI__.event && (now - lastEmit) > emitInterval) {
                    lastEmit = now;
                    window.__TAURI__.event.emit('global_mousemove', { screenX: e.screenX, screenY: e.screenY });
                }
            }, { passive: true });

            document.addEventListener('pointerup', (e) => {
                if (!dragging) return;
                dragging = false;
                document.body.style.userSelect = '';
                document.body.style.cursor = '';
                if (hsplit) hsplit.classList.remove('dragging');
                try { hsplit.releasePointerCapture && hsplit.releasePointerCapture(e.pointerId); } catch(_) {}
                if (dragOverlay && dragOverlay.parentNode) dragOverlay.parentNode.removeChild(dragOverlay);
                if (dragGhost && dragGhost.parentNode) dragGhost.parentNode.removeChild(dragGhost);
                const y = e.clientY;
                const ratio = (window.innerHeight - y) / window.innerHeight;
                applyPane4Ratio(ratio, true);
                if (window.__TAURI__ && window.__TAURI__.event) {
                    window.__TAURI__.event.emit('splitter_drag_end');
                    window.__TAURI__.event.emit('global_mouseup');
                }
            });
        })();

    </script>
</body>
</html>
