<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pane 2 - Center View</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0fdf4;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        h1 {
            color: #15803d;
            font-size: 20px;
            margin-top: 0;
            border-bottom: 2px solid #22c55e;
            padding-bottom: 10px;
        }
        .badge {
            display: inline-block;
            background-color: #22c55e;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 15px;
            align-self: flex-start;
        }
        p {
            line-height: 1.6;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .interactive-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-grow: 1;
        }
        textarea {
            width: 100%;
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-family: monospace;
            font-size: 14px;
            resize: none;
            box-sizing: border-box;
        }
        textarea:focus {
            outline: none;
            border-color: #22c55e;
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
        }
        .btn {
            background-color: #22c55e;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            text-align: center;
        }
        .btn:hover {
            background-color: #16a34a;
        }
        .status-msg {
            font-size: 12px;
            color: #64748b;
            margin-top: 5px;
        }
        /* タブ用のスタイル */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            border-bottom: 1px solid #cbd5e1;
            padding-bottom: 8px;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            color: #64748b;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .tab-btn:hover {
            background-color: #f1f5f9;
            color: #1e293b;
        }
        .tab-btn.active {
            background-color: #22c55e;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="badge">画面 2 / Center View</span>
        <h1 id="view-title">メモ帳</h1>
       
        <!-- タブボタンの追加 -->
        <div class="tabs">
            <button class="tab-btn active" id="tab-editor" onclick="switchTab('editor')">📝 メモ帳</button>
            <button class="tab-btn" id="tab-settings" onclick="switchTab('settings')">⚙️ システム設定</button>
            <button class="tab-btn" id="tab-credentials" onclick="switchTab('credentials')">🔑 アカウント保存</button>
        </div>

        <div id="content-editor" class="tab-content">
            <p>この画面は完全に独立したメモ帳です。ここに入力されたテキストは、メモリやローカルストレージに保持できます。</p>
            <div class="interactive-section">
                <textarea id="memo" placeholder="ここに自由にメモを入力してください..."></textarea>
                <button class="btn" onclick="saveMemo()">ローカルに保存</button>
                <div id="status" class="status-msg"></div>
            </div>
        </div>

        <div id="content-settings" class="tab-content" style="display: none;">
            <p>システムの動作に関する設定を行います。変更は即座に反映されます。</p>
            <div class="interactive-section" style="gap: 15px;">
                <div>
                    <label for="reearth-url-input" style="font-weight: bold; font-size: 14px; color: #15803d; margin-bottom: 5px; display: block;">Re:Earth 接続URL</label>
                    <input type="text" id="reearth-url-input" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; box-sizing: border-box;" placeholder="https://example.visualizer.reearth.io/">
                </div>
                <button class="btn" onclick="saveReearthUrl()">URLを保存</button>
                <div id="settings-status" class="status-msg"></div>
            </div>
        </div>

        <div id="content-credentials" class="tab-content" style="display: none;">
            <p>OS標準のセキュアストア（資格情報マネージャー）にIDとパスワードを安全に保存・管理します。</p>
            <div class="interactive-section" style="gap: 12px;">
                <div>
                    <label for="cred-service" style="font-weight: bold; font-size: 13px; display: block; margin-bottom: 4px;">サービス名・サイト名</label>
                    <div style="display: flex; gap: 6px;">
                        <select id="cred-service-select" style="padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; background-color: white; font-size: 14px; width: 140px;" onchange="onServiceSelectChange()">
                            <option value="Box">Box</option>
                            <option value="ReEarth">ReEarth</option>
                            <option value="Google">Google</option>
                            <option value="custom">直接入力...</option>
                        </select>
                        <input type="text" id="cred-service" style="flex: 1; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; display: none;" placeholder="任意のサービス名" value="Box">
                    </div>
                </div>
                <div>
                    <label for="cred-username" style="font-weight: bold; font-size: 13px; display: block; margin-bottom: 4px;">ログインID・メールアドレス</label>
                    <input type="text" id="cred-username" style="width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;" placeholder="user@example.com">
                </div>
                <div>
                    <label for="cred-password" style="font-weight: bold; font-size: 13px; display: block; margin-bottom: 4px;">パスワード</label>
                    <input type="password" id="cred-password" style="width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;" placeholder="••••••••">
                </div>
                <div style="display: flex; gap: 8px;">
                    <button class="btn" style="flex: 1;" onclick="saveCredentials()">安全に保存</button>
                    <button class="btn" style="flex: 1; background-color: #64748b;" onclick="loadCredentials()">呼び出し</button>
                    <button class="btn" style="flex: 1; background-color: #3b82f6;" onclick="autofillWebview()">自動入力</button>
                    <button class="btn" style="flex: 1; background-color: #ef4444;" onclick="deleteCredentials()">削除</button>
                </div>
                <div id="cred-status" class="status-msg"></div>
            </div>
        </div>
    </div>

    <script>
        // タブ切り替え処理
        function switchTab(tabName) {
            document.getElementById('tab-editor').classList.toggle('active', tabName === 'editor');
            document.getElementById('tab-settings').classList.toggle('active', tabName === 'settings');
            document.getElementById('tab-credentials').classList.toggle('active', tabName === 'credentials');

            document.getElementById('content-editor').style.display = tabName === 'editor' ? 'block' : 'none';
            document.getElementById('content-settings').style.display = tabName === 'settings' ? 'block' : 'none';
            document.getElementById('content-credentials').style.display = tabName === 'credentials' ? 'block' : 'none';

            const title = document.getElementById('view-title');
            if (tabName === 'editor') {
                title.textContent = 'メモ帳';
            } else if (tabName === 'settings') {
                title.textContent = 'システム設定';
            } else {
                title.textContent = 'アカウント保存';
            }
        }

        // ロード時にメモを復元
        window.onload = function() {
            const saved = localStorage.getItem("kasugai_memo");
            if (saved) {
                document.getElementById("memo").value = saved;
            }

            // Re:Earth URLの復元
            const savedReearth = localStorage.getItem("reearth_url") || "https://c-01kcwqbkykrk15apgxeqrvr6rv.visualizer.reearth.io/";
            document.getElementById("reearth-url-input").value = savedReearth;

            // クエリパラメータ settings=true がある場合はシステム設定を表示
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('settings') === 'true') {
                switchTab('settings');
            }
        };

        function saveReearthUrl() {
            const url = document.getElementById("reearth-url-input").value.trim();
            if (!url) {
                alert("URLを入力してください。");
                return;
            }

            try {
                new URL(url);
            } catch (_) {
                alert("有効なURLを入力してください。（例: https://example.com）");
                return;
            }

            localStorage.setItem("reearth_url", url);

            if (window.__TAURI__ && window.__TAURI__.event) {
                window.__TAURI__.event.emit('reearth_url_changed', { url: url });
            }

            const status = document.getElementById("settings-status");
            status.textContent = "設定を保存しました！ (" + new Date().toLocaleTimeString() + ")";
            setTimeout(() => {
                status.textContent = "";
            }, 3000);
        }

        function saveMemo() {
            const text = document.getElementById("memo").value;
            localStorage.setItem("kasugai_memo", text);
            const status = document.getElementById("status");
            status.textContent = "保存しました！ (" + new Date().toLocaleTimeString() + ")";
            setTimeout(() => {
                status.textContent = "";
            }, 3000);
        }

        // サービス名セレクトボックスの変更イベントハンドラ
        function onServiceSelectChange() {
            const selectEl = document.getElementById("cred-service-select");
            const inputEl = document.getElementById("cred-service");
            if (selectEl.value === "custom") {
                inputEl.style.display = "block";
                inputEl.value = "";
                inputEl.focus();
            } else {
                inputEl.style.display = "none";
                inputEl.value = selectEl.value;
            }
        }

        // --- OS資格情報マネージャー保護システムの実装 ---
        async function saveCredentials() {
            const service = document.getElementById("cred-service").value.trim();
            const username = document.getElementById("cred-username").value.trim();
            const password = document.getElementById("cred-password").value;
            const status = document.getElementById("cred-status");

            if (!service || !username) {
                alert("サービス名とID/メールアドレスは必須入力です。");
                return;
            }

            status.textContent = "OSのセキュア保管庫に保存中...";
            try {
                if (window.__TAURI__ && window.__TAURI__.core) {
                    await window.__TAURI__.core.invoke("save_credentials", { service, username, password });
                    status.textContent = "安全に資格情報を保存しました！ (" + new Date().toLocaleTimeString() + ")";
                    // パスワード入力欄はセキュリティのためすぐクリア
                    document.getElementById("cred-password").value = "";
                } else {
                    status.textContent = "Tauri環境が検出されません。デスクトップアプリから実行してください。";
                }
            } catch (err) {
                status.textContent = "保存エラー: " + err;
            }
        }

        async function loadCredentials() {
            const service = document.getElementById("cred-service").value.trim();
            const username = document.getElementById("cred-username").value.trim();
            const status = document.getElementById("cred-status");

            if (!service || !username) {
                alert("サービス名とID/メールアドレスを入力してください。");
                return;
            }

            status.textContent = "OSのセキュア保管庫から取得中...";
            try {
                if (window.__TAURI__ && window.__TAURI__.core) {
                    const password = await window.__TAURI__.core.invoke("get_credentials", { service, username });
                    document.getElementById("cred-password").value = password;
                    status.textContent = "セキュアストアからパスワードを取得・自動復元しました！";
                } else {
                    status.textContent = "Tauri環境が検出されません。";
                }
            } catch (err) {
                status.textContent = "取得に失敗しました。資格情報が存在しないか暗号化アクセスエラーです。";
            }
        }

        async function deleteCredentials() {
            const service = document.getElementById("cred-service").value.trim();
            const username = document.getElementById("cred-username").value.trim();
            const status = document.getElementById("cred-status");

            if (!service || !username) {
                alert("サービス名とID/メールアドレスを入力してください。");
                return;
            }

            if (!confirm("OSからこのログイン資格情報を完全に削除してよろしいですか？")) {
                return;
            }

            status.textContent = "OSセキュアストアから削除中...";
            try {
                if (window.__TAURI__ && window.__TAURI__.core) {
                    await window.__TAURI__.core.invoke("delete_credentials", { service, username });
                    document.getElementById("cred-password").value = "";
                    status.textContent = "安全に削除されました。";
                } else {
                    status.textContent = "Tauri環境が検出されません。";
                }
            } catch (err) {
                status.textContent = "削除エラー: " + err;
            }
        }

        async function autofillWebview() {
            const service = document.getElementById("cred-service").value.trim();
            const username = document.getElementById("cred-username").value.trim();
            const status = document.getElementById("cred-status");

            if (!service || !username) {
                alert("サービス名とIDを入力してください。");
                return;
            }

            status.textContent = "セキュアストアから読み出して自動入力中...";
            try {
                if (window.__TAURI__ && window.__TAURI__.core) {
                    // pane2（中央）および pane3（右）のWebviewに自動入力スクリプトを注入します
                    await window.__TAURI__.core.invoke("autofill_credentials", {
                        targetPanes: ["pane2", "pane3"],
                        service: service,
                        username: username
                    });
                    status.textContent = "自動入力を送信しました。対象ペインを確認してください！";
                } else {
                    status.textContent = "Tauri環境が検出されません。";
                }
            } catch (err) {
                status.textContent = "自動入力失敗: " + err;
            }
        }

        // --- スプリッターのドラッグ・リサイズ用中継処理 ---
        (function() {
            let isDragging = false;
            let activeSplitter = null;

            if (window.__TAURI__ && window.__TAURI__.event) {
                // 親がドラッグを開始したことを検知
                window.__TAURI__.event.listen('splitter_drag_start', (event) => {
                    isDragging = true;
                    activeSplitter = event.payload.activeSplitter;
                });

                // 親がドラッグを終了したことを検知
                window.__TAURI__.event.listen('splitter_drag_end', () => {
                    isDragging = false;
                    activeSplitter = null;
                });

                // ドラッグ中、マウスのグローバル座標を親に伝える
                window.addEventListener('mousemove', (e) => {
                    if (isDragging && activeSplitter) {
                        window.__TAURI__.event.emit('global_mousemove', {
                            screenX: e.screenX,
                            screenY: e.screenY
                        });
                    }
                });

                // ドラッグ中にこのペイン上でマウスを離した場合
                window.addEventListener('mouseup', () => {
                    if (isDragging) {
                        window.__TAURI__.event.emit('global_mouseup');
                    }
                });
            }
        })();
    </script>
</body>
</html>
