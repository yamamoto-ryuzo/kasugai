<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasugai Splitter Base</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a; /* スプリッターの背景（隙間の色） */
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        /* スプリッターバーのデザイン */
        .splitter {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 8px;
            background-color: #334155;
            cursor: col-resize;
            z-index: 9999;
            transition: background-color 0.15s;
        }
        .splitter:hover, .splitter.dragging {
            background-color: #3b82f6; /* ホバー・ドラッグ時に青く光らせる */
        }
        /* 画面1が閉じている時のスプリッターを分かりやすくする装飾 */
        .splitter.splitter1-closed {
            background-color: #3b82f6; /* 閉じている時は青く光らせてアピール */
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.8);
            border-right: 1px solid #ffffff;
        }
    </style>
</head>
<body>
    <div id="splitter1" class="splitter"></div>
    <div id="splitter2" class="splitter"></div>

    <script>
        const splitter1 = document.getElementById('splitter1');
        const splitter2 = document.getElementById('splitter2');

        let ratio1 = 0.1;
        let ratio2 = 0.8;
        const splitterWidth = 8;
        const sh = splitterWidth / 2;

        // 初期配置をセット
        function updateSplitterElements() {
            const w = window.innerWidth;
            
            // 画面1が開いている時（0.0以外の時）は、常に最小幅 80px で完全に固定する
            if (ratio1 !== 0.0) {
                ratio1 = 80 / w;
            }

            splitter1.style.left = (w * ratio1 - sh) + 'px';
            splitter2.style.left = (w * ratio2 - sh) + 'px';

            // 画面1が閉じている（0.0）の場合にスプリッター1を強調する
            if (ratio1 === 0.0) {
                splitter1.classList.add('splitter1-closed');
            } else {
                splitter1.classList.remove('splitter1-closed');
            }
        }

        updateSplitterElements();
        window.addEventListener('resize', updateSplitterElements, { passive: true });

        let activeSplitter = null;

        // ドラッグ状態を子Webview全体に通知
        function notifyDragStart() {
            if (window.__TAURI__ && window.__TAURI__.event) {
                window.__TAURI__.event.emit('splitter_drag_start', {
                    activeSplitter: activeSplitter,
                    ratio1: ratio1,
                    ratio2: ratio2
                });
            }
        }

        function notifyDragEnd() {
            if (window.__TAURI__ && window.__TAURI__.event) {
                window.__TAURI__.event.emit('splitter_drag_end');
            }
        }

        function onMouseDown(e, splitterNum) {
            e.preventDefault();
            activeSplitter = splitterNum;
            document.body.style.cursor = 'col-resize';
            if (splitterNum === 1) splitter1.classList.add('dragging');
            if (splitterNum === 2) splitter2.classList.add('dragging');

            notifyDragStart();
        }

        splitter1.addEventListener('mousedown', (e) => onMouseDown(e, 1));
        splitter2.addEventListener('mousedown', (e) => onMouseDown(e, 2));

        // スプリッターのダブルクリックによる最大化・復元
        splitter1.addEventListener('dblclick', () => {
            if (window.__TAURI__ && window.__TAURI__.core) {
                window.__TAURI__.core.invoke('pane_dblclick', { pane: 'pane1' });
            }
        });
        splitter2.addEventListener('dblclick', () => {
            if (window.__TAURI__ && window.__TAURI__.core) {
                window.__TAURI__.core.invoke('pane_dblclick', { pane: 'pane2' });
            }
        });

        // マウス位置に基づくスプリッター比率の更新ロジック
        function handleMove(clientX, clientY) {
            if (!activeSplitter) return;

            // 水平スプリッター(画面2下部 pane4) の場合は Y 座標で比率を計算
            if (activeSplitter === 'hsplit') {
                const h = window.innerHeight;
                let newRatio = (h - clientY) / h;
                if (newRatio < 0.05) newRatio = 0.05;
                if (newRatio > 0.6) newRatio = 0.6;
                // Rust 側の pane4 比率更新コマンドを呼ぶ
                if (window.__TAURI__ && window.__TAURI__.core) {
                    window.__TAURI__.core.invoke('update_pane4_ratio', { ratio: newRatio });
                }
                return;
            }

            const w = window.innerWidth;
            let newRatio = clientX / w;

            if (activeSplitter === 1) {
                // 80px（最小幅）未満の縮尺になったら左端にスナップ（クローズ）する
                const closeThreshold = 80 / w;
                if (newRatio < closeThreshold) {
                    newRatio = 0.0;
                } else {
                    newRatio = 80 / w; // 開いている時は常に最小幅（80px）で常時固定にする
                }
                ratio1 = newRatio;
            } else if (activeSplitter === 2) {
                const minRatio = 0.05;
                if (newRatio < ratio1 + minRatio) newRatio = ratio1 + minRatio;
                if (newRatio > 1 - minRatio) newRatio = 1 - minRatio;
                ratio2 = newRatio;
            }

            updateSplitterElements();

            // Rustバックエンドを呼び出してWebviewをリサイズ
            if (window.__TAURI__ && window.__TAURI__.core) {
                window.__TAURI__.core.invoke('update_splitter', { ratio1, ratio2 });
            }
        }

        // 自身のWebview上での動き
        window.addEventListener('mousemove', (e) => {
            if (!activeSplitter) return;
            handleMove(e.clientX, e.clientY);
        }, { passive: true });

        // ドラッグ終了処理
        function endDrag() {
            if (!activeSplitter) return;

            splitter1.classList.remove('dragging');
            splitter2.classList.remove('dragging');
            activeSplitter = null;
            document.body.style.cursor = 'default';

            notifyDragEnd();
        }

        window.addEventListener('mouseup', endDrag, { passive: true });

        // --- Tauri イベントシステムによる他Webviewからのマウスクリップの中継 ---
        if (window.__TAURI__ && window.__TAURI__.event) {
            // Rustから発行された比率更新イベントを受け取る
            window.__TAURI__.event.listen('update_splitter_ui', (event) => {
                if (event.payload) {
                    ratio1 = event.payload.ratio1;
                    ratio2 = event.payload.ratio2;
                    updateSplitterElements();
                }
            });

            // 他のWebviewで検知されたmousemoveを受け取る（絶対座標 screenX/screenY を クライアント座標に変換）
            window.__TAURI__.event.listen('global_mousemove', (event) => {
                if (!activeSplitter) return;
                
                const clientX = event.payload.screenX - window.screenX;
                const clientY = event.payload.screenY - window.screenY;
                handleMove(clientX, clientY);
            });

            // 他のWebviewでマウスボタンが離された場合
            window.__TAURI__.event.listen('global_mouseup', () => {
                endDrag();
            });

            // 子Webview側での比率変更の同期（もしあれば）
            window.__TAURI__.event.listen('request_ratios', () => {
                window.__TAURI__.event.emit('sync_ratios', { ratio1, ratio2 });
            });
        }
    </script>
</body>
</html>
