<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pane 3 - Right View</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }
        .header-tabs {
            height: 50px;
            background-color: #ffffff;
            border-bottom: 1px solid #cbd5e1;
            display: flex;
            align-items: center;
            padding: 0 10px;
            box-sizing: border-box;
            overflow-x: auto;
            white-space: nowrap;
            min-width: 280px;
            flex-shrink: 0;
        }
        .container {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            margin: 10px;
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 280px;
            min-height: 0;
        }
        h1 {
            color: #1e3a8a;
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 10px;
            border-bottom: 2px solid #3b82f6;
            padding-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        /* チャットインターフェース */
        .chat-container {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            min-height: 0;
        }
        .chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-color: #f1f5f9;
            border-radius: 6px;
            margin-bottom: 10px;
            border: 1px solid #e2e8f0;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-all;
        }
        .message.user {
            align-self: flex-end;
            background-color: #3b82f6;
            color: #ffffff;
            border-bottom-right-radius: 2px;
        }
        .message.gemini {
            align-self: flex-start;
            background-color: #ffffff;
            color: #0f172a;
            border-bottom-left-radius: 2px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .message.error {
            align-self: center;
            background-color: #fef2f2;
            color: #dc2626;
            border: 1px solid #fca5a5;
            max-width: 95%;
        }
        .message-time {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.7;
            align-self: flex-end;
        }
        .message.user .message-time {
            color: #e0f2fe;
        }
        .message.gemini .message-time {
            color: #64748b;
        }
        .chat-input-area {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }
        .chat-input {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            resize: none;
            box-sizing: border-box;
            height: 62px;
            max-height: 120px;
            font-family: inherit;
        }
        .chat-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.15);
        }
        .send-btn {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .send-btn:hover {
            background-color: #2563eb;
        }
        .send-btn:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }
        .clear-btn {
            background-color: #e2e8f0;
            color: #475569;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        .clear-btn:hover {
            background-color: #cbd5e1;
        }
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
        }
        .typing-dot {
            width: 6px;
            height: 6px;
            background-color: #3b82f6;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
        /* タブ用のスタイル */
        .tabs {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        .tab-btn {
            background: none;
            border: 1px solid #cbd5e1;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: bold;
            color: #64748b;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 150px;
        }
        .tab-title {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .tab-close {
            display: inline-block;
            width: 16px;
            height: 16px;
            line-height: 14px;
            text-align: center;
            border-radius: 50%;
            background-color: #e2e8f0;
            color: #475569;
            font-size: 10px;
            cursor: pointer;
        }
        .tab-close:hover {
            background-color: #ef4444;
            color: white;
        }
        .tab-btn:hover {
            background-color: #f1f5f9;
        }
        .tab-btn.active {
            background-color: #be123c;
            color: white;
            border-color: #be123c;
        }
        .tab-btn.active .tab-close {
            background-color: rgba(255,255,255,0.2);
            color: white;
        }
        .tab-btn.active .tab-close:hover {
            background-color: #fff;
            color: #be123c;
        }
        .tab-btn.detached {
            background-color: #cbd5e1;
            color: #64748b;
            border-style: dashed;
            cursor: default;
        }
        .tab-btn.detached:hover {
            background-color: #94a3b8;
            color: #ffffff;
            cursor: pointer;
        }
        /* AI回答用のマークダウンスタイル */
        .message.gemini h1, .message.gemini h2, .message.gemini h3, .message.gemini h4 {
            margin-top: 12px;
            margin-bottom: 6px;
            color: #1e3a8a;
            font-weight: bold;
        }
        .message.gemini h1 { font-size: 16px; border-bottom: 1px solid #cbd5e1; padding-bottom: 4px; }
        .message.gemini h2 { font-size: 15px; border-bottom: 1px solid #e2e8f0; padding-bottom: 2px; }
        .message.gemini h3 { font-size: 14px; }
        .message.gemini h4 { font-size: 13px; }
        .message.gemini ul, .message.gemini ol {
            margin-top: 6px;
            margin-bottom: 6px;
            padding-left: 20px;
        }
        .message.gemini li {
            margin-bottom: 4px;
        }
        .message.gemini p {
            margin: 6px 0;
        }
        .message.gemini table {
            border-collapse: collapse;
            width: 100%;
            margin: 10px 0;
            font-size: 13px;
        }
        .message.gemini th, .message.gemini td {
            border: 1px solid #cbd5e1;
            padding: 6px 10px;
            text-align: left;
        }
        .message.gemini th {
            background-color: #f1f5f9;
            font-weight: bold;
        }
        .message.gemini blockquote {
            margin: 8px 0;
            padding-left: 12px;
            border-left: 4px solid #cbd5e1;
            color: #475569;
            font-style: italic;
        }
        .message.gemini code {
            background-color: #f1f5f9;
            color: #eb5757;
            padding: 2px 4px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
        }
        .message.gemini pre {
            background-color: #1e293b;
            color: #f8fafc;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            font-family: monospace;
            font-size: 13px;
            margin: 8px 0;
        }
        .message.gemini pre code {
            background: none;
            color: inherit;
            padding: 0;
            font-size: inherit;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="header-tabs">
        <div class="tabs" id="tabs-container">
            <button class="tab-btn active" id="tab-default" onclick="switchPane3Tab('default')" oncontextmenu="handleRightDoubleClick(event, window.location.origin + '/index3.html', false)">
                <span class="tab-title">✨  Gemini</span>
            </button>
        </div>
    </div>

    <div class="container" id="content-default">
        <h1 style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
            <span style="display: flex; align-items: center; gap: 8px;">✨ Gemini AI アシスタント</span>
            <select id="gemini-model-select" onchange="saveSelectedModel()" style="padding: 6px 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; background-color: white; font-weight: normal; color: #475569; outline: none; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.05); min-width: 150px;">
                <option value="gemini-2.0-flash" selected>Gemini 2 Flash</option>
                <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                <option value="gemini-3-flash">Gemini 3 Flash</option>
                <option value="gemini-3.1-pro">Gemini 3.1 Pro</option>
                <option value="gemini-3.1-flash-lite">Gemini 3.1 Flash Lite (OpenRouter)</option>
                <option value="gemini-3.5-flash">Gemini 3.5 Flash</option>
            </select>
        </h1>
        
        <div class="chat-container">
            <div class="chat-messages" id="chat-messages">
                <div class="message gemini">
                    こんにちは！Gemini AI アシスタントです。質問やお手伝いできることがあれば何でもどうぞ。
                    <br><small style="color: #64748b; font-size: 11px;">※あらかじめシステム設定（⚙️）でGemini APIキーを登録してください。</small>
                    <span class="message-time">システム</span>
                </div>
            </div>

            <div id="token-meter-container" style="display: none; padding: 6px 10px; margin-bottom: 8px; background-color: #f1f5f9; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 11px; color: #475569; width: 100%; box-sizing: border-box;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                    <span style="font-weight: bold;">📊 コンテキスト使用量 (トークン数):</span>
                    <span id="token-text" style="font-family: monospace;">0 / 1,048,576 (0.00%)</span>
                </div>
                <div style="width: 100%; height: 6px; background-color: #cbd5e1; border-radius: 3px; overflow: hidden;">
                    <div id="token-bar" style="width: 0%; height: 100%; background-color: #10b981; transition: width 0.3s;"></div>
                </div>
                <div style="display: flex; justify-content: space-between; margin-top: 3px; color: #64748b; font-size: 10px;">
                    <span id="token-detail-prompt">入力: -</span>
                    <span id="token-detail-candidates">出力: -</span>
                </div>
            </div>

            <div class="chat-input-area">
                <button class="clear-btn" onclick="clearHistory()" title="会話履歴をクリア">🗑️</button>
                <textarea class="chat-input" id="chat-input" rows="2" placeholder="Gemini にメッセージを送信..." onkeydown="handleKeyDown(event)"></textarea>
                <button class="send-btn" id="send-btn" onclick="sendMessage()">送信</button>
            </div>
        </div>
    </div>

    <script>
        let currentTabs = ['default'];
        let detachedTabs = new Set();

        async function detachTab(tabId, title) {
            if (detachedTabs.has(tabId)) {
                if (window.__TAURI__ && window.__TAURI__.core) {
                    await window.__TAURI__.core.invoke('detach_window', { 
                        label: tabId, 
                        url: getTabUrl(tabId),
                        title: title || 'Kasugai Detached Window'
                    });
                }
                return;
            }

            if (window.__TAURI__ && window.__TAURI__.core) {
                const url = getTabUrl(tabId);
                await window.__TAURI__.core.invoke('detach_window', { 
                    label: tabId, 
                    url: url,
                    title: title || 'Kasugai Detached Window'
                });
                
                detachedTabs.add(tabId);
                const btn = document.getElementById('tab-' + tabId);
                if (btn) btn.classList.add('detached');
            }
        }

        function getTabUrl(tabId) {
            if (tabId === 'default') {
                return window.location.origin + '/index3.html';
            }
            const btn = document.getElementById('tab-' + tabId);
            return btn ? btn.getAttribute('data-url') : window.location.href;
        }

        async function openTabInBrowser(url) {
            if (window.__TAURI__ && window.__TAURI__.core) {
                await window.__TAURI__.core.invoke('open_in_default_browser', { url: url });
            }
        }

        // 右ダブルクリック検出用
        let lastRightClickTime = 0;
        const RIGHT_DOUBLE_CLICK_THRESHOLD = 300; // ミリ秒

        function handleRightDoubleClick(e, url, closeAfterOpen = false) {
            e.preventDefault();
            const now = Date.now();
            if (now - lastRightClickTime < RIGHT_DOUBLE_CLICK_THRESHOLD) {
                // 右ダブルクリックと判定
                openTabInBrowser(url);
                lastRightClickTime = 0;
                
                // Gemini以外のタブの場合、ブラウザで開いた後にタブを閉じる
                if (closeAfterOpen) {
                    const tabId = e.target.closest('.tab-btn').id.replace('tab-', '');
                    closePane3Tab(e, tabId);
                }
            } else {
                lastRightClickTime = now;
            }
        }

        function switchPane3Tab(tabId) {
            // UIのアクティブ状態の更新
            currentTabs.forEach(t => {
                const el = document.getElementById('tab-' + t);
                if (el) el.classList.toggle('active', tabId === t);
            });

            // ローカルコンテンツの表示
            const container = document.getElementById('content-default');
            if (container) {
                container.style.display = (tabId === 'default') ? 'flex' : 'none';
            }

            // Rustバックエンドにタブ切り替えを通知
            if (window.__TAURI__ && window.__TAURI__.core) {
                window.__TAURI__.core.invoke('switch_pane3_tab', { tab: tabId });
            }
        }

        function closePane3Tab(e, tabId) {
            e.stopPropagation(); // 親のswitchPane3Tabの発火を防ぐ
            
            // 要素を削除
            const el = document.getElementById('tab-' + tabId);
            if (el) el.remove();
            
            currentTabs = currentTabs.filter(t => t !== tabId);

            // Rustバックエンドにタブ削除を通知
            if (window.__TAURI__ && window.__TAURI__.core) {
                window.__TAURI__.core.invoke('close_pane3_tab', { tab: tabId });
            }
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function clearHistory() {
            const chatMessages = document.getElementById('chat-messages');
            chatMessages.innerHTML = `
                <div class="message gemini">
                    会話をリセットしました。何か御用はありますか？
                    <span class="message-time">${new Date().toLocaleTimeString()}</span>
                </div>
            `;
            const meterContainer = document.getElementById('token-meter-container');
            if (meterContainer) {
                meterContainer.style.display = 'none';
            }
        }

        function updateTokenMeter(promptTokens, candidatesTokens, totalTokens) {
            const meterContainer = document.getElementById('token-meter-container');
            const tokenText = document.getElementById('token-text');
            const tokenBar = document.getElementById('token-bar');
            const promptDetail = document.getElementById('token-detail-prompt');
            const candidatesDetail = document.getElementById('token-detail-candidates');

            if (!meterContainer || !totalTokens) return;

            // モデルに基づいて最大トークンを設定
            const modelSelect = document.getElementById('gemini-model-select');
            const model = modelSelect ? modelSelect.value : 'gemini-1.5-flash';
            
            let maxTokens = 1048576; // 1,048,576 (約100万トークン、Flash系のデフォルト)
            if (model.includes('pro')) {
                maxTokens = 2097152; // 2,097,152 (約200万トークン、Pro系)
            }

            const percentage = Math.min((totalTokens / maxTokens) * 100, 100);

            meterContainer.style.display = 'block';
            tokenText.textContent = `${totalTokens.toLocaleString()} / ${maxTokens.toLocaleString()} (${percentage.toFixed(4)}%)`;
            tokenBar.style.width = `${percentage}%`;

            // 色を変更（例: 80%以上は黄色、95%以上は赤）
            if (percentage >= 95) {
                tokenBar.style.backgroundColor = '#ef4444';
            } else if (percentage >= 80) {
                tokenBar.style.backgroundColor = '#f59e0b';
            } else {
                tokenBar.style.backgroundColor = '#10b981';
            }

            if (promptTokens !== undefined && promptTokens !== null) {
                promptDetail.textContent = `入力: ${promptTokens.toLocaleString()} トークン`;
            }
            if (candidatesTokens !== undefined && candidatesTokens !== null) {
                candidatesDetail.textContent = `出力: ${candidatesTokens.toLocaleString()} トークン`;
            }
        }

        function saveSelectedModel() {
            const modelSelect = document.getElementById('gemini-model-select');
            if (modelSelect) {
                localStorage.setItem('gemini_selected_model', modelSelect.value);
            }
        }

        // モデル一覧をプロバイダに応じてフィルタする
        const OPENROUTER_ONLY = new Set(['gemini-3.1-flash-lite']);
        // ALL_MODELS は Google 側で表示する標準モデル一覧（OpenRouter専用モデルは含めない）
        const ALL_MODELS = [
            { value: 'gemini-2.0-flash', text: 'Gemini 2 Flash' },
            { value: 'gemini-2.5-flash', text: 'Gemini 2.5 Flash' },
            { value: 'gemini-2.5-pro', text: 'Gemini 2.5 Pro' },
            { value: 'gemini-3-flash', text: 'Gemini 3 Flash' },
            { value: 'gemini-3.1-pro', text: 'Gemini 3.1 Pro' },
            { value: 'gemini-3.5-flash', text: 'Gemini 3.5 Flash' }
        ];

        function ensureModelOptionsPresent(sel) {
            // add any missing standard options (keeps order at end)
            for (const m of ALL_MODELS) {
                if (!Array.from(sel.options).some(o => o.value === m.value)) {
                    const opt = document.createElement('option');
                    opt.value = m.value;
                    opt.text = m.text;
                    sel.appendChild(opt);
                }
            }
        }

        function filterModelsByProvider(provider) {
            const sel = document.getElementById('gemini-model-select');
            if (!sel) return;

            // normalize existing set
            if (provider === 'openrouter') {
                // remove all options not allowed for OpenRouter
                Array.from(sel.options).forEach(o => {
                    if (!OPENROUTER_ONLY.has(o.value)) o.remove();
                });
                // ensure OpenRouter-friendly option exists
                if (!Array.from(sel.options).some(o => OPENROUTER_ONLY.has(o.value))) {
                    const opt = document.createElement('option');
                    opt.value = 'gemini-3.1-flash-lite';
                    opt.text = 'Gemini 3.1 Flash Lite (OpenRouter)';
                    sel.appendChild(opt);
                }
            } else {
                // google (default) - remove OpenRouter-only options and ensure standard options exist
                Array.from(sel.options).forEach(o => { if (OPENROUTER_ONLY.has(o.value)) o.remove(); });
                ensureModelOptionsPresent(sel);
            }

            // 選択されているモデルが現在の選択肢に含まれていなければ先頭を選択して保存
            if (!Array.from(sel.options).some(o => o.value === sel.value)) {
                if (sel.options.length > 0) sel.selectedIndex = 0;
                saveSelectedModel();
            }
        }

        // ロード時にモデルの選択状態を復元（ただしまずプロバイダでフィルタ）
        window.addEventListener('DOMContentLoaded', () => {
            const provider = localStorage.getItem('gemini_provider') || 'google';
            filterModelsByProvider(provider);

            const savedModel = localStorage.getItem('gemini_selected_model');
            const modelSelect = document.getElementById('gemini-model-select');
            if (savedModel && modelSelect) {
                if (Array.from(modelSelect.options).some(o => o.value === savedModel)) {
                    modelSelect.value = savedModel;
                } else {
                    // saved model is not available for current provider
                    if (modelSelect.options.length > 0) modelSelect.selectedIndex = 0;
                    saveSelectedModel();
                }
            }
        });

        // 設定画面からのモデル変更を受け取り、選択肢を同期する
        if (window.__TAURI__ && window.__TAURI__.event) {
            window.__TAURI__.event.listen('gemini_model_changed', (ev) => {
                try {
                    const model = ev.payload.model;
                    const sel = document.getElementById('gemini-model-select');
                    if (sel && model) {
                        sel.value = model;
                        localStorage.setItem('gemini_selected_model', model);
                    }
                } catch(e) {}
            });
            // 設定画面からプロバイダ変更が来た場合、OpenRouter向けのモデルを候補に追加する
            window.__TAURI__.event.listen('gemini_provider_changed', (ev) => {
                try {
                    const provider = ev.payload.provider || localStorage.getItem('gemini_provider') || 'google';
                    filterModelsByProvider(provider);
                } catch(e) {}
            });
        }

        async function sendMessage() {
            const inputEl = document.getElementById('chat-input');
            const sendBtn = document.getElementById('send-btn');
            const chatMessages = document.getElementById('chat-messages');
            const modelSelect = document.getElementById('gemini-model-select');
            const model = modelSelect ? modelSelect.value : 'gemini-1.5-flash';
            
            const prompt = inputEl.value.trim();
            if (!prompt) return;

            // ユーザーメッセージを追加
            const timeStr = new Date().toLocaleTimeString();
            const userMsgEl = document.createElement('div');
            userMsgEl.className = 'message user';
            userMsgEl.innerHTML = `${escapeHtml(prompt)}<span class="message-time">${timeStr}</span>`;
            chatMessages.appendChild(userMsgEl);
            
            // 入力欄をクリアしてスクロール
            inputEl.value = '';
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // ローディング表示（タイピングインジケータ）
            const loadingMsgEl = document.createElement('div');
            loadingMsgEl.className = 'message gemini';
            loadingMsgEl.id = 'gemini-loading';
            loadingMsgEl.innerHTML = `
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            chatMessages.appendChild(loadingMsgEl);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // ボタンなどの無効化
            inputEl.disabled = true;
            sendBtn.disabled = true;

            try {
                if (window.__TAURI__ && window.__TAURI__.core) {
                    // Rust側の call_gemini コマンドを呼び出す
                    const res = await window.__TAURI__.core.invoke("call_gemini", { prompt: prompt, model: model });
                    
                    // ローディング削除
                    loadingMsgEl.remove();

                    // Geminiの応答を追加
                    const geminiMsgEl = document.createElement('div');
                    geminiMsgEl.className = 'message gemini';
                    geminiMsgEl.innerHTML = `${formatMarkdown(res.text)}<span class="message-time">${new Date().toLocaleTimeString()}</span>`;
                    chatMessages.appendChild(geminiMsgEl);

                    // メーターの更新
                    if (res.total_tokens) {
                        updateTokenMeter(res.prompt_tokens, res.candidates_tokens, res.total_tokens);
                    }
                } else {
                    loadingMsgEl.remove();
                    const errEl = document.createElement('div');
                    errEl.className = 'message error';
                    errEl.innerHTML = `Tauri環境が検出されませんでした。デスクトップアプリから実行してください。<span class="message-time">${new Date().toLocaleTimeString()}</span>`;
                    chatMessages.appendChild(errEl);
                }
            } catch (err) {
                loadingMsgEl.remove();
                const errEl = document.createElement('div');
                errEl.className = 'message error';
                errEl.innerHTML = `エラー: ${escapeHtml(err)}<span class="message-time">${new Date().toLocaleTimeString()}</span>`;
                chatMessages.appendChild(errEl);
            } finally {
                inputEl.disabled = false;
                sendBtn.disabled = false;
                inputEl.focus();
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        }

        function escapeHtml(string) {
            if (typeof string !== 'string') return string;
            return string.replace(/[&<>"']/g, function(match) {
                const escapeMap = {
                    '&': '\x26amp;',
                    '<': '\x26lt;',
                    '>': '\x26gt;',
                    '"': '\x26quot;',
                    "'": '&#039;'
                };
                return escapeMap[match];
            });
        }

        // マークダウンパーサー（marked.js が読み込めていればそれを使用し、なければ簡易フォールバック）
        function formatMarkdown(text) {
            if (typeof marked !== 'undefined' && typeof marked.parse === 'function') {
                try {
                    return marked.parse(text);
                } catch (e) {
                    console.error("marked.parse error:", e);
                }
            }
            
            // 以下、簡易フォールバック用パーサー
            let escaped = escapeHtml(text);
            
            // コードブロック ```code```
            escaped = escaped.replace(/```([\s\S]+?)```/g, function(match, code) {
                return `<pre style="background-color: #1e293b; color: #f8fafc; padding: 10px; border-radius: 4px; overflow-x: auto; font-family: monospace; font-size: 13px; margin: 8px 0;"><code>${code}</code></pre>`;
            });

            // インラインコード `code`
            escaped = escaped.replace(/`([^`\n]+?)`/g, function(match, code) {
                return `<code style="background-color: #f1f5f9; color: #eb5757; padding: 2px 4px; border-radius: 4px; font-family: monospace; font-size: 13px;">${code}</code>`;
            });

            // 強調 **text**
            escaped = escaped.replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');

            // 改行の変換
            return escaped.replace(/\n/g, '<br>');
        }

        // タブの追加イベントのリッスン
        if (window.__TAURI__ && window.__TAURI__.event) {
            window.__TAURI__.event.listen('pane3_new_tab', (event) => {
                const tabId = event.payload.id;
                const url = event.payload.url;
                
                // ドメイン部分をタイトルにする
                let title = url;
                try {
                    const u = new URL(url);
                    title = u.hostname;
                } catch(e) {}

                if (!currentTabs.includes(tabId)) {
                    currentTabs.push(tabId);
                    
                    const btn = document.createElement('button');
                    btn.className = 'tab-btn';
                    btn.id = 'tab-' + tabId;
                    btn.setAttribute('data-url', url);
                    btn.onclick = () => switchPane3Tab(tabId);
                    btn.oncontextmenu = (e) => handleRightDoubleClick(e, url, true);
                    
                    const spanTitle = document.createElement('span');
                    spanTitle.className = 'tab-title';
                    spanTitle.textContent = title;
                    
                    const spanClose = document.createElement('span');
                    spanClose.className = 'tab-close';
                    spanClose.textContent = '×';
                    spanClose.onclick = (e) => closePane3Tab(e, tabId);
                    
                    btn.appendChild(spanTitle);
                    btn.appendChild(spanClose);
                    
                    document.getElementById('tabs-container').appendChild(btn);
                }
                
                // 新しいタブをアクティブにする
                switchPane3Tab(tabId);
            });
            
            // アクティブタブがRust側で変更された場合の同期（close後など）
            window.__TAURI__.event.listen('pane3_active_changed', (event) => {
                const newActive = event.payload.id;
                
                currentTabs.forEach(t => {
                    const el = document.getElementById('tab-' + t);
                    if (el) el.classList.toggle('active', newActive === t);
                });

                const container = document.getElementById('content-default');
                if (container) {
                    container.style.display = (newActive === 'default' || newActive === '') ? 'flex' : 'none';
                }
            });

            // ウィンドウが閉じられた際の復元通知
            window.__TAURI__.event.listen('window_restored', (event) => {
                const label = event.payload.label;
                detachedTabs.delete(label);
                const btn = document.getElementById('tab-' + label);
                if (btn) btn.classList.remove('detached');
            });
        }

        // --- スプリッターのドラッグ・リサイズ用中継処理 ---
        (function() {
            let isDragging = false;
            let activeSplitter = null;

            if (window.__TAURI__ && window.__TAURI__.event) {
                // 親がドラッグを開始したことを検知
                window.__TAURI__.event.listen('splitter_drag_start', (event) => {
                    isDragging = true;
                    activeSplitter = event.payload.activeSplitter;
                });

                // 親がドラッグを終了したことを検知
                window.__TAURI__.event.listen('splitter_drag_end', () => {
                    isDragging = false;
                    activeSplitter = null;
                });

                // ドラッグ中、マウスのグローバル座標を親に伝える
                window.addEventListener('mousemove', (e) => {
                    if (isDragging && activeSplitter) {
                        window.__TAURI__.event.emit('global_mousemove', {
                            screenX: e.screenX,
                            screenY: e.screenY
                        });
                    }
                });

                // ドラッグ中にこのペイン上でマウスを離した場合
                window.addEventListener('mouseup', () => {
                    if (isDragging) {
                        window.__TAURI__.event.emit('global_mouseup');
                    }
                });
            }
        })();
    </script>
</body>
</html>
