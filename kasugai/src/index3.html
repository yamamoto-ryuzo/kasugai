<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pane 3 - Right View</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fff1f2;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }
        .header-tabs {
            height: 50px;
            background-color: #ffffff;
            border-bottom: 1px solid #cbd5e1;
            display: flex;
            align-items: center;
            padding: 0 10px;
            box-sizing: border-box;
            overflow-x: auto;
            white-space: nowrap;
        }
        .container {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin: 10px;
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        h1 {
            color: #be123c;
            font-size: 20px;
            margin-top: 0;
            border-bottom: 2px solid #f43f5e;
            padding-bottom: 10px;
        }
        .badge {
            display: inline-block;
            background-color: #f43f5e;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 15px;
            align-self: flex-start;
        }
        p {
            line-height: 1.6;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .btn {
            background-color: #f43f5e;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            text-align: center;
        }
        .btn:hover {
            background-color: #e11d48;
        }
        .output-box {
            background-color: #1e293b;
            color: #38bdf8;
            border-radius: 6px;
            padding: 15px;
            font-family: monospace;
            font-size: 13px;
            white-space: pre-wrap;
            flex-grow: 1;
            margin-top: 15px;
            box-sizing: border-box;
            border: 1px solid #334155;
            overflow-y: auto;
        }
        /* タブ用のスタイル */
        .tabs {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        .tab-btn {
            background: none;
            border: 1px solid #cbd5e1;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: bold;
            color: #64748b;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 150px;
        }
        .tab-title {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .tab-close {
            display: inline-block;
            width: 16px;
            height: 16px;
            line-height: 14px;
            text-align: center;
            border-radius: 50%;
            background-color: #e2e8f0;
            color: #475569;
            font-size: 10px;
            cursor: pointer;
        }
        .tab-close:hover {
            background-color: #ef4444;
            color: white;
        }
        .tab-btn:hover {
            background-color: #f1f5f9;
        }
        .tab-btn.active {
            background-color: #be123c;
            color: white;
            border-color: #be123c;
        }
        .tab-btn.active .tab-close {
            background-color: rgba(255,255,255,0.2);
            color: white;
        }
        .tab-btn.active .tab-close:hover {
            background-color: #fff;
            color: #be123c;
        }
    </style>
</head>
<body>
    <div class="header-tabs">
        <div class="tabs" id="tabs-container">
            <button class="tab-btn active" id="tab-default" onclick="switchPane3Tab('default')">
                <span class="tab-title">🏠 ホーム</span>
            </button>
        </div>
    </div>

    <div class="container" id="content-default">
        <h1>Rust バックエンド連携</h1>
        <p>この画面では、Tauri IPC（Inter-Process Communication）を利用して、Rustのネイティブコードを直接呼び出します。</p>
        
        <button class="btn" onclick="callRust()">Rustコマンドを呼び出す</button>
        
        <div id="output" class="output-box">ここにRustからの応答が表示されます...</div>
    </div>

    <script>
        let currentTabs = ['default'];

        function switchPane3Tab(tabId) {
            // UIのアクティブ状態の更新
            currentTabs.forEach(t => {
                const el = document.getElementById('tab-' + t);
                if (el) el.classList.toggle('active', tabId === t);
            });

            // ローカルコンテンツの表示
            const container = document.getElementById('content-default');
            if (container) {
                container.style.display = (tabId === 'default') ? 'flex' : 'none';
            }

            // Rustバックエンドにタブ切り替えを通知
            if (window.__TAURI__ && window.__TAURI__.core) {
                window.__TAURI__.core.invoke('switch_pane3_tab', { tab: tabId });
            }
        }

        function closePane3Tab(e, tabId) {
            e.stopPropagation(); // 親のswitchPane3Tabの発火を防ぐ
            
            // 要素を削除
            const el = document.getElementById('tab-' + tabId);
            if (el) el.remove();
            
            currentTabs = currentTabs.filter(t => t !== tabId);

            // Rustバックエンドにタブ削除を通知
            if (window.__TAURI__ && window.__TAURI__.core) {
                window.__TAURI__.core.invoke('close_pane3_tab', { tab: tabId });
            }
        }

        async function callRust() {
            const output = document.getElementById("output");
            output.textContent = "呼び出し中...";
            try {
                // Tauri v2 の invoke API を使ってRustの get_system_info コマンドを呼び出す
                if (window.__TAURI__ && window.__TAURI__.core) {
                    const result = await window.__TAURI__.core.invoke("get_system_info");
                    output.textContent = result + "\n\n取得時刻: " + new Date().toLocaleTimeString();
                } else {
                    output.textContent = "エラー: Tauri環境が検出されませんでした。\nTauriアプリとして実行してください。";
                }
            } catch (err) {
                output.textContent = "エラーが発生しました:\n" + err;
            }
        }

        // タブの追加イベントのリッスン
        if (window.__TAURI__ && window.__TAURI__.event) {
            window.__TAURI__.event.listen('pane3_new_tab', (event) => {
                const tabId = event.payload.id;
                const url = event.payload.url;
                
                // ドメイン部分をタイトルにする
                let title = url;
                try {
                    const u = new URL(url);
                    title = u.hostname;
                } catch(e) {}

                if (!currentTabs.includes(tabId)) {
                    currentTabs.push(tabId);
                    
                    const btn = document.createElement('button');
                    btn.className = 'tab-btn';
                    btn.id = 'tab-' + tabId;
                    btn.onclick = () => switchPane3Tab(tabId);
                    
                    const spanTitle = document.createElement('span');
                    spanTitle.className = 'tab-title';
                    spanTitle.textContent = title;
                    
                    const spanClose = document.createElement('span');
                    spanClose.className = 'tab-close';
                    spanClose.textContent = '×';
                    spanClose.onclick = (e) => closePane3Tab(e, tabId);
                    
                    btn.appendChild(spanTitle);
                    btn.appendChild(spanClose);
                    
                    document.getElementById('tabs-container').appendChild(btn);
                }
                
                // 新しいタブをアクティブにする
                switchPane3Tab(tabId);
            });
            
            // アクティブタブがRust側で変更された場合の同期（close後など）
            window.__TAURI__.event.listen('pane3_active_changed', (event) => {
                const newActive = event.payload.id;
                
                currentTabs.forEach(t => {
                    const el = document.getElementById('tab-' + t);
                    if (el) el.classList.toggle('active', newActive === t);
                });

                const container = document.getElementById('content-default');
                if (container) {
                    container.style.display = (newActive === 'default' || newActive === '') ? 'flex' : 'none';
                }
            });
        }

        // --- スプリッターのドラッグ・リサイズ用中継処理 ---
        (function() {
            let isDragging = false;
            let activeSplitter = null;

            if (window.__TAURI__ && window.__TAURI__.event) {
                // 親がドラッグを開始したことを検知
                window.__TAURI__.event.listen('splitter_drag_start', (event) => {
                    isDragging = true;
                    activeSplitter = event.payload.activeSplitter;
                });

                // 親がドラッグを終了したことを検知
                window.__TAURI__.event.listen('splitter_drag_end', () => {
                    isDragging = false;
                    activeSplitter = null;
                });

                // ドラッグ中、マウスのグローバル座標を親に伝える
                window.addEventListener('mousemove', (e) => {
                    if (isDragging && activeSplitter) {
                        window.__TAURI__.event.emit('global_mousemove', {
                            screenX: e.screenX,
                            screenY: e.screenY
                        });
                    }
                });

                // ドラッグ中にこのペイン上でマウスを離した場合
                window.addEventListener('mouseup', () => {
                    if (isDragging) {
                        window.__TAURI__.event.emit('global_mouseup');
                    }
                });
            }
        })();
    </script>
</body>
</html>
