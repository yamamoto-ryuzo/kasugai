<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pane 1 - Portal Links</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        h1 {
            color: #1e3a8a;
            font-size: 20px;
            margin-top: 0;
            border-bottom: 2px solid #3b82f6;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .badge {
            display: inline-block;
            background-color: #3b82f6;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 15px;
            align-self: flex-start;
        }
        .link-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-grow: 1;
        }
        .portal-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 16px 20px;
            text-decoration: none;
            color: #1e293b;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.2s ease;
        }
        .portal-btn:hover {
            background-color: #eff6ff;
            border-color: #3b82f6;
            color: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 2px 4px rgba(59, 130, 246, 0.1);
        }
        .portal-btn .icon {
            font-size: 18px;
        }
        .footer {
            margin-top: auto;
            font-size: 11px;
            color: #64748b;
            text-align: center;
            border-top: 1px solid #f1f5f9;
            padding-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ポータル</h1>
        
        <div class="link-list">
            <!-- Box へのリンク (中央ペインで開くようにターゲットを pane2 面に変更) -->
            <a class="portal-btn" href="https://account.box.com/login" onclick="openLink(event, this.href, 'pane2')">
                <span>📦 BOX</span>
            </a>
            
            <!-- Google Map へのリンク (従来どおり画面2で開く) -->
            <a class="portal-btn" href="https://www.google.com/maps" onclick="openLink(event, this.href, 'pane2')">
                <span>🗺️ Google Map</span>
            </a>
            
            <!-- Re:Earth へのリンク (動的URL) -->
            <a class="portal-btn" href="#" onclick="openReearth(event)">
                <span>🌐 Re:Earth</span>
            </a>
        </div>
        
        <div class="footer">
            <!-- 左右切替ボタン -->
            <div style="display: flex; gap: 8px; justify-content: center; margin-bottom: 12px; border-bottom: 1px solid #f1f5f9; padding-bottom: 8px;">
                <button id="toggle-pane-btn" class="portal-btn" style="padding: 8px 12px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 4px;" onclick="togglePane()">
                    <span>🔄 表示切替</span>
                </button>
            </div>
            <a href="#" id="system-settings-btn" style="color: #3b82f6; text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 5px;" onclick="openSystemSettings(event)">
                <span>⚙️ システム設定</span>
            </a>
        </div>
    </div>

    <script>
        // Re:Earth URLを開く
        function openReearth(event) {
            event.preventDefault();
            const url = localStorage.getItem("reearth_url") || "https://c-01kcwqbkykrk15apgxeqrvr6rv.visualizer.reearth.io/";
            openLink(event, url, 'pane2');
        }

        // システム設定を開く
        function openSystemSettings(event) {
            event.preventDefault();
            const url = window.location.origin + '/index2.html?settings=true';
            openLink(event, url, 'pane2');
        }

        // 左右のペイン表示を切り替える（画面2と画面3の位置入替）
        let currentCenter = 'pane2';
        async function togglePane() {
            if (window.__TAURI__ && window.__TAURI__.core) {
                try {
                    currentCenter = (currentCenter === 'pane2') ? 'pane3' : 'pane2';
                    await window.__TAURI__.core.invoke('set_center', { center: currentCenter });
                } catch (e) {
                    console.error('表示切替に失敗しました: ', e);
                }
            } else {
                console.warn('Tauri 環境が見つかりません。アプリ内で実行してください。');
            }
        }

        // ポータルリンクをクリックした際、指定ターゲット of Webviewで開く
        function openLink(event, url, target) {
            event.preventDefault();
            if (window.__TAURI__ && window.__TAURI__.core) {
                if (target === 'pane3') {
                    window.__TAURI__.core.invoke('open_in_pane3', { url: url });
                } else {
                    window.__TAURI__.core.invoke('open_in_pane2', { url: url });
                }
            } else {
                console.warn("Tauri環境が検出されません。URLをブラウザで開きます:", url);
                window.open(url, '_blank');
            }
        }

        // 他のWebviewからURL変更通知を受け取った場合の処理
        if (window.__TAURI__ && window.__TAURI__.event) {
            window.__TAURI__.event.listen('reearth_url_changed', (event) => {
                localStorage.setItem("reearth_url", event.payload.url);
            });
        }

        // --- スプリッターのドラッグ・リサイズ用中継処理 ---
        (function() {
            let isDragging = false;
            let activeSplitter = null;

            if (window.__TAURI__ && window.__TAURI__.event) {
                // 親がドラッグを開始したことを検知
                window.__TAURI__.event.listen('splitter_drag_start', (event) => {
                    isDragging = true;
                    activeSplitter = event.payload.activeSplitter;
                });

                // 親がドラッグを終了したことを検知
                window.__TAURI__.event.listen('splitter_drag_end', () => {
                    isDragging = false;
                    activeSplitter = null;
                });

                // ドラッグ中、マウスのグローバル座標を親に伝える
                window.addEventListener('mousemove', (e) => {
                    if (isDragging && activeSplitter) {
                        window.__TAURI__.event.emit('global_mousemove', {
                            screenX: e.screenX,
                            screenY: e.screenY
                        });
                    }
                });

                // ドラッグ中にこのペイン上でマウスを離した場合
                window.addEventListener('mouseup', () => {
                    if (isDragging) {
                        window.__TAURI__.event.emit('global_mouseup');
                    }
                });
            }
        })();
    </script>
</body>
</html>
