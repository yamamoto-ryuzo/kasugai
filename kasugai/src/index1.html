<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pane 1 - Portal Links</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff; /* シンプルな白背景 */
            color: #333;
            margin: 0;
            padding: 6px 8px 6px 3px; /* 左右に少し物理余白（右8px、左3px）を設けて、スプリッター重なり回避と美観を両立 */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            box-sizing: border-box;
            overflow: hidden; /* 固定幅なのでスクロールバーを完全になしにする */
        }
        .container {
            background-color: transparent; /* 装飾枠・影をすべて削除 */
            border: none;
            box-shadow: none;
            padding: 0;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            min-width: 80px; /* スプリッターの幅を考慮し、最小幅を 80px に微調整 */
            width: 100%; /* 左右の余白はbodyのpaddingで綺麗にとるため、コンテナは100%幅にする */
        }
        .link-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }
        .portal-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            padding: 4px 2px; /* パディングをさらに小さく */
            text-decoration: none;
            color: #1e293b;
            font-weight: bold;
            font-size: 12px; /* ボタンのフォントサイズを一回り小さく（13pxから12pxに） */
            transition: all 0.2s ease;
            box-sizing: border-box;
            height: 30px; /* ボタンの高さを一回り小さく（34pxから30pxに） */
        }
        .portal-btn:hover {
            background-color: #eff6ff;
            border-color: #3b82f6;
            color: #2563eb;
        }
        input {
            width: 100%;
            padding: 6px 2px; /* 左右パディングを2pxに縮小し文字見切れを防止 */
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 13px; /* 元の見やすいサイズに戻す */
            text-align: center; /* 中央揃えで見やすく */
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="link-list">
            <!-- 超コンパクト・リモコン型UI (縦一列に隙間なく収める) -->
            <div style="display: flex; flex-direction: column; gap: 8px;">
                <div style="font-size: 13px; font-weight: bold; color: #1e293b; text-align: center; border-bottom: 1px solid #cbd5e1; padding-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">🗺️ 連携</div>
                
                <button class="portal-btn" onclick="getLocation(event)" style="width: 95%; background-color: #22c55e; color: white; border-color: #16a34a; cursor: pointer;" title="位置情報を取得">
                    取得
                </button>

                <div style="display: flex; flex-direction: column; gap: 6px; width: 95%;">
                    <div title="緯度">
                        <input type="text" id="input-lat" placeholder="Lat">
                    </div>
                    <div title="経度">
                        <input type="text" id="input-lng" placeholder="Lng">
                    </div>
                    <div title="縮尺 (Zoom)">
                        <input type="text" id="input-zoom" placeholder="Zoom">
                    </div>
                </div>

                <button class="portal-btn" onclick="moveMap(event)" style="width: 95%; background-color: #3b82f6; color: white; border-color: #2563eb; cursor: pointer;" title="地図を移動">
                    移動
                </button>

                <div id="location-status" style="margin-top: 3px; font-size: 10px; color: #dc2626; display: none; text-align: center; word-break: break-all;"></div>
            </div>
        </div>
    </div>

    <script>
        function parseLocation(urlStr) {
            try {
                let lat = null, lng = null, zoom = null;

                // 1) Google Earth 形式: /@lat,lng,...,<distance>d
                const matchEarth = urlStr.match(/@(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?).*?,(\d+(?:\.\d+)?)d/);
                if (matchEarth) {
                    lat = Number(matchEarth[1]).toFixed(6);
                    lng = Number(matchEarth[2]).toFixed(6);
                    const distance = parseFloat(matchEarth[3]);
                    zoom = Number(27 - Math.log2(distance || 5000)).toFixed(4);
                    return { lat, lng, zoom, originalUrl: urlStr };
                }

                // 2) 汎用 @ セグメント解析（Google Maps の多くの変種に対応）
                const atIndex = urlStr.indexOf('@');
                if (atIndex >= 0) {
                    // @ の直後から / または ? までを切り出す
                    const afterAt = urlStr.substring(atIndex + 1);
                    let cutPos = afterAt.search(/[/?#]/);
                    if (cutPos === -1) cutPos = afterAt.length;
                    const coordsPart = afterAt.substring(0, cutPos);
                    const parts = coordsPart.split(',');
                    if (parts.length >= 3) {
                        const maybeLat = parseFloat(parts[0]);
                        const maybeLng = parseFloat(parts[1]);
                        const maybeZoomOrMeters = parts[2];
                        if (!isNaN(maybeLat) && !isNaN(maybeLng)) {
                            lat = maybeLat.toFixed(6);
                            lng = maybeLng.toFixed(6);
                            const m = maybeZoomOrMeters.match(/^([0-9]+(?:\.\d+)?)([a-zA-Z]?)$/);
                            if (m) {
                                const val = parseFloat(m[1]);
                                const unit = (m[2] || '').toLowerCase();
                                if (unit === 'z' || unit === '') {
                                    zoom = Number(val).toFixed(4);
                                } else if (unit === 'm') {
                                    zoom = Number(27 - Math.log2(val || 5000)).toFixed(4);
                                }
                            }
                            return { lat, lng, zoom, originalUrl: urlStr };
                        }
                    }
                }

                // 3) Cesium ハッシュ形式: #lat=...&lon=...&zoom=...
                const matchLat = urlStr.match(/[#?&]lat=(-?\d+(?:\.\d+)?)/);
                const matchLon = urlStr.match(/[#?&]lon=(-?\d+(?:\.\d+)?)/);
                const matchZoom = urlStr.match(/[#?&](?:zoom|z)=(\d+(?:\.\d+)?)/);
                const matchHeight = urlStr.match(/[#?&]height=(-?\d+(?:\.\d+)?)/);
                if (matchLat && matchLon) {
                    lat = Number(matchLat[1]).toFixed(6);
                    lng = Number(matchLon[1]).toFixed(6);
                    if (matchZoom) {
                        zoom = Number(matchZoom[1]).toFixed(4);
                    } else if (matchHeight) {
                        // Re:Earth の height を地図ズームに近似変換
                        const height = parseFloat(matchHeight[1]);
                        // 同様の原理で距離->ズーム変換 (Google Earth に合わせた経験的変換)
                        const z = 27 - Math.log2(Math.max(1, height || 5000));
                        zoom = Number(z).toFixed(4);
                    } else {
                        zoom = "15.0000";
                    }
                    return { lat, lng, zoom, originalUrl: urlStr };
                }

                // 4) クエリパラメータ形式: ?lat=...&lon=...&zoom=...
                const qLat = urlStr.match(/[?&#]lat=(-?\d+(?:\.\d+)?)/);
                const qLon = urlStr.match(/[?&#]lon=(-?\d+(?:\.\d+)?)/);
                const qZoom = urlStr.match(/[?&#](?:zoom|z)=(\d+(?:\.\d+)?)/);
                if (qLat && qLon) {
                    lat = Number(qLat[1]).toFixed(6);
                    lng = Number(qLon[1]).toFixed(6);
                    zoom = qZoom ? Number(qZoom[1]).toFixed(4) : "15.0000";
                    return { lat, lng, zoom, originalUrl: urlStr };
                }

                return null;
            } catch (e) {
                return null;
            }
        }

        // クリップボードや任意テキストから緯度・経度・ズームを抽出するフォールバック
        function extractLatLngZoomFromText(text) {
            if (!text) return null;
            // 1) JSON内に lat/lng/zoom がある場合
            try {
                const jsonMatch = text.match(/\{[\s\S]*\}/);
                if (jsonMatch) {
                    try {
                        const obj = JSON.parse(jsonMatch[0]);
                        if (obj && (obj.lat || obj.latitude || obj.lng || obj.lon || obj.longitude)) {
                            const lat = (obj.lat ?? obj.latitude ?? obj.latitude ?? obj.lat) || obj.latitude || obj.lat;
                            const lng = (obj.lng ?? obj.lon ?? obj.longitude) || obj.lng || obj.lon;
                            const zoom = obj.zoom ?? obj.z ?? obj.level ?? null;
                            if (lat !== undefined && lng !== undefined) {
                                return { lat: Number(lat).toFixed(6), lng: Number(lng).toFixed(6), zoom: zoom ? String(zoom) : '' };
                            }
                        }
                    } catch(e) { /* ignore JSON parse errors */ }
                }
            } catch(e) {}

            // 2) クエリ文字列風: lat=..&lon=.. または lat:.., lon:..
            const kvLat = text.match(/(?:lat|latitude)[\s:=]*(-?\d+\.?\d+)/i);
            const kvLng = text.match(/(?:lon|lng|longitude)[\s:=]*(-?\d+\.?\d+)/i);
            const kvZoom = text.match(/(?:zoom|z)[\s:=]*(-?\d+\.?\d+)/i);
            const kvHeight = text.match(/(?:height)[\s:=]*(-?\d+\.?\d+)/i) || text.match(/[?&#]height=(-?\d+(?:\.\d+)?)/i);
            if (kvLat && kvLng) {
                let z = kvZoom ? String(kvZoom[1]) : '';
                if (!z && kvHeight) {
                    const h = parseFloat(kvHeight[1]);
                    const zz = 27 - Math.log2(Math.max(1, h || 5000));
                    z = Number(zz).toFixed(4);
                }
                return { lat: Number(kvLat[1]).toFixed(6), lng: Number(kvLng[1]).toFixed(6), zoom: z };
            }

            // 3) テキスト中の浮動小数点数列から最初の2つを lat/lng として使う
            const nums = Array.from(text.matchAll(/-?\d+\.\d+/g)).map(m => m[0]);
            if (nums.length >= 2) {
                // 値の順序が lon,lat になっているケースもあるので、緯度の範囲で判定
                let a = Number(nums[0]);
                let b = Number(nums[1]);
                let lat = a, lng = b;
                if (Math.abs(a) > 90 && Math.abs(b) <= 90) {
                    // a は経度で範囲外 -> swap
                    lat = b; lng = a;
                }
                const maybeZoom = nums[2] ? String(nums[2]) : '';
                return { lat: Number(lat).toFixed(6), lng: Number(lng).toFixed(6), zoom: maybeZoom };
            }

            // 4) 整数のみ（ズームなど）が混ざる場合は整数列を抽出して最後の数値をズームに使う
            const ints = Array.from(text.matchAll(/-?\d+/g)).map(m => m[0]);
            if (ints.length >= 2) {
                const a = Number(ints[0]);
                const b = Number(ints[1]);
                if (Math.abs(a) <= 90 && Math.abs(b) <= 180) {
                    const zoom = ints.length >= 3 ? String(ints[2]) : '';
                    return { lat: Number(a).toFixed(6), lng: Number(b).toFixed(6), zoom };
                }
            }

            return null;
        }

        async function getLocation(event) {
            if (event) event.preventDefault();
            const statusDiv = document.getElementById('location-status');
            statusDiv.style.display = 'none';

            if (window.__TAURI__ && window.__TAURI__.core) {
                try {
                    // Re:Earth はプラグイン内でクリップボードへ permalink をコピーするため、
                    // アクティブが reearth の場合はクリップボードから読み取る（ユーザーの取得ボタン操作があるため許可あり）。
                    let url = '';
                    try {
                        const active = await window.__TAURI__.core.invoke('get_active_pane2');
                        if (active === 'reearth' && navigator.clipboard && navigator.clipboard.readText) {
                            try {
                                url = await navigator.clipboard.readText();
                            } catch (e) {
                                // 読み取り失敗したらフォールバックで通常の取得を試す
                                url = await window.__TAURI__.core.invoke('get_pane2_url');
                            }
                        } else {
                            url = await window.__TAURI__.core.invoke('get_pane2_url');
                        }
                    } catch (e) {
                        // Tauri呼び出し失敗時は従来の取得を試す
                        url = await window.__TAURI__.core.invoke('get_pane2_url');
                    }

                    let loc = parseLocation(url);
                    if (!loc) {
                        // 直接URL解析が失敗したら、クリップボード内の任意テキストから抽出を試みる
                        loc = extractLatLngZoomFromText(url);
                    }
                    if (loc) {
                        document.getElementById('input-lat').value = loc.lat;
                        document.getElementById('input-lng').value = loc.lng;
                        document.getElementById('input-zoom').value = loc.zoom || '';
                        statusDiv.style.display = 'none';
                    } else {
                        statusDiv.style.display = 'block';
                        statusDiv.style.color = '#dc2626';
                        statusDiv.innerHTML = `位置情報を解析できませんでした。<br><a href="${url}" target="_blank" style="color: #3b82f6;">${url}</a>`;
                    }
                } catch (e) {
                    statusDiv.style.display = 'block';
                    statusDiv.style.color = '#dc2626';
                    statusDiv.textContent = "位置情報の取得に失敗しました: " + e;
                }
            } else {
                statusDiv.style.display = 'block';
                statusDiv.style.color = '#dc2626';
                statusDiv.textContent = "Tauri環境で実行してください。";
            }
        }

        async function moveMap(event) {
            if (event) event.preventDefault();
            const statusDiv = document.getElementById('location-status');
            
            const lat = document.getElementById('input-lat').value.trim();
            const lng = document.getElementById('input-lng').value.trim();
            let zoom = document.getElementById('input-zoom').value.trim();
            if (!zoom) zoom = '15'; // デフォルト

            if (!lat || !lng) {
                statusDiv.style.display = 'block';
                statusDiv.style.color = '#dc2626';
                statusDiv.textContent = "緯度と経度を入力してください。";
                return;
            }

            if (window.__TAURI__ && window.__TAURI__.core) {
                try {
                    // 判定: 現在のアクティブタブ種別を問い合わせ（reearth のときはクリップボードへコピー）
                    let activeTab = '';
                    try {
                        activeTab = await window.__TAURI__.core.invoke('get_active_pane2');
                    } catch (e) { /* ignore */ }

                    // Re:Earth タブがアクティブな場合は Re:Earth 用 URL を組み立ててクリップボードへコピー
                    if (activeTab === 'reearth') {
                        try {
                            const base = (localStorage.getItem('reearth_url') || 'https://reearth.io/').split('?')[0];
                            // height を zoom から逆算
                            const height = Math.pow(2, 27 - Number(zoom));
                            const reearthUrl = `${base}?lat=${lat}&lng=${lng}&height=${Number(height).toFixed(4)}&heading=0&pitch=-90`;
                            if (navigator.clipboard && navigator.clipboard.writeText) {
                                await navigator.clipboard.writeText(reearthUrl);
                                statusDiv.style.display = 'block';
                                statusDiv.style.color = '#15803d';
                                statusDiv.textContent = 'Re:Earth 用 URL をクリップボードへコピーしました。プラグインで貼り付けてください。';
                                setTimeout(() => { statusDiv.style.display = 'none'; }, 2500);
                                return;
                            } else {
                                // フォールバック: Rust 経由でクリップボードに書き込むことも可能だが、ここでは通知する
                                statusDiv.style.display = 'block';
                                statusDiv.style.color = '#dc2626';
                                statusDiv.textContent = 'クリップボードへコピーできませんでした。ブラウザの権限を確認してください。';
                                return;
                            }
                        } catch (e) {
                            statusDiv.style.display = 'block';
                            statusDiv.style.color = '#dc2626';
                            statusDiv.textContent = 'Re:Earth URL の生成/コピーに失敗しました: ' + e;
                            return;
                        }
                    }

                    // デフォルトはGoogle Maps 等へ遷移
                    // 現在画面2で開いている地図サービスを判定
                    let currentUrlStr = "";
                    try {
                        currentUrlStr = await window.__TAURI__.core.invoke('get_pane2_url');
                    } catch(err) {}

                    // デフォルトはGoogle Maps
                    let targetUrl = `https://www.google.com/maps/@${lat},${lng},${zoom}z`;

                    try {
                        if (currentUrlStr) {
                            // URLオブジェクトパース前の生文字列（currentUrlStr）によるより確実なサービス判定
                            if (currentUrlStr.includes('yahoo.co.jp')) {
                                targetUrl = `https://map.yahoo.co.jp/?lat=${lat}&lon=${lng}&zoom=${zoom}`;
                            } else if (currentUrlStr.includes('earth.google.com')) {
                                // Google Earth 用に標準のZoom値からカメラ距離(d)へ簡易逆変換
                                const distance = Math.pow(2, 27 - Number(zoom)).toFixed(2);
                                targetUrl = `https://earth.google.com/web/@${lat},${lng},0a,${distance}d,35y,0h,0t,0r`;
                            } else if (currentUrlStr.includes('cesium')) {
                                // CesiumJS専用のハッシュURLを組み立てて遷移させる
                                targetUrl = `${window.location.origin}/cesium.html#lat=${lat}&lon=${lng}&zoom=${zoom}`;
                            } else if (currentUrlStr.includes('index2.html')) {
                                // index2.htmlの場合は何もしない（設定画面などのため）
                            }
                        }
                    } catch(err) {
                        // パース失敗時はデフォルトのGoogle Mapsを使用
                    }

                    await window.__TAURI__.core.invoke('open_in_pane2', { url: targetUrl });
                    statusDiv.style.display = 'none';
                } catch (e) {
                    statusDiv.style.display = 'block';
                    statusDiv.style.color = '#dc2626';
                    statusDiv.textContent = "移動に失敗しました: " + e;
                }
            } else {
                statusDiv.style.display = 'block';
                statusDiv.style.color = '#dc2626';
                statusDiv.textContent = "Tauri環境で実行してください。";
            }
        }
        // 1. BOX専用のオープン関数
        async function openBox(event, url, target) {
            if (event) event.preventDefault();
            if (window.__TAURI__ && window.__TAURI__.core) {
                const email = localStorage.getItem("box_email") || "";
                let password = "";
                if (email) {
                    try {
                        password = await window.__TAURI__.core.invoke('get_credential', { service: 'Kasugai_Box', username: email });
                        if (password) {
                            await window.__TAURI__.core.invoke('open_box_in_pane', { 
                                target: target, 
                                url: url, 
                                creds: { email, password } 
                            });
                            return;
                        }
                    } catch (e) { console.warn("BOX認証失敗:", e); }
                }
                // 資格情報がない場合は指定のターゲット（基本はpane2）で開く
                if (target === 'pane3') {
                    window.__TAURI__.core.invoke('open_in_pane3', { url: url });
                } else {
                    window.__TAURI__.core.invoke('open_in_pane2', { url: url });
                }
            }
        }

        // 2. Re:Earth専用のオープン関数
        async function openReearth(event) {
            if (event) event.preventDefault();
            const url = localStorage.getItem("reearth_url") || "https://c-01kcwqbkykrk15apgxeqrvr6rv.visualizer.reearth.io/";
            const target = 'pane2';

            if (window.__TAURI__ && window.__TAURI__.core) {
                const email = localStorage.getItem("reearth_email") || "";
                let password = "";
                if (email) {
                    try {
                        password = await window.__TAURI__.core.invoke('get_credential', { service: 'Kasugai_Reearth', username: email });
                        if (password) {
                            // 物理タイピング方式の専用コマンドを呼び出し
                            await window.__TAURI__.core.invoke('open_reearth_in_pane', { 
                                target: target, 
                                url: url, 
                                creds: { email, password } 
                            });
                            return;
                        }
                    } catch (e) { console.warn("Re:Earth認証失敗:", e); }
                }
                window.__TAURI__.core.invoke('open_in_pane2', { url: url });
            }
        }

        // 3. 通常のオープン関数（Google Map等）
        async function openLink(event, url, target) {
            if (event) event.preventDefault();
            if (window.__TAURI__ && window.__TAURI__.core) {
                if (target === 'pane3') {
                    window.__TAURI__.core.invoke('open_in_pane3', { url: url });
                } else {
                    window.__TAURI__.core.invoke('open_in_pane2', { url: url });
                }
            }
        }

        function openSystemSettings(event) {
            event.preventDefault();
            const url = window.location.origin + '/index2.html?settings=true';
            openLink(event, url, 'pane2');
        }

        if (window.__TAURI__ && window.__TAURI__.event) {
            window.__TAURI__.event.listen('reearth_url_changed', (e) => localStorage.setItem("reearth_url", e.payload.url));
            window.__TAURI__.event.listen('box_credentials_changed', (e) => localStorage.setItem("box_email", e.payload.email));
            window.__TAURI__.event.listen('reearth_credentials_changed', (e) => localStorage.setItem("reearth_email", e.payload.email));
        }

        async function preloadBasicAuth() {
            if (window.__TAURI__ && window.__TAURI__.core) {
                // 1. 各専用WebViewのプリロード開始（初回URLセット）
                const reearthUrl = localStorage.getItem("reearth_url") || "https://c-01kcwqbkykrk15apgxeqrvr6rv.visualizer.reearth.io/";
                const boxUrl = "https://account.box.com/login";
                // Google Mapsの初期プリロード時に座標（東京駅）を明示して初期表示の遅延・現在地取得による灰色のままになる不具合を回避
                const googleUrl = "https://www.google.co.jp/maps/@35.681236,139.767125,15z";

                window.__TAURI__.core.invoke('preload_webview', { target: 'pane2_reearth', url: reearthUrl });
                window.__TAURI__.core.invoke('preload_webview', { target: 'pane2_box', url: boxUrl });
                window.__TAURI__.core.invoke('preload_webview', { target: 'pane2_google', url: googleUrl });

                // 2. Re:EarthのBasic認証プレフェッチ（認証情報がある場合）
                const email = localStorage.getItem("reearth_email") || "";
                if (email) {
                    try {
                        const password = await window.__TAURI__.core.invoke('get_credential', { service: 'Kasugai_Reearth', username: email });
                        if (password) {
                            await window.__TAURI__.core.invoke('prefetch_basic_auth', { url: reearthUrl, creds: { email, password } });
                        }
                    } catch (e) {}
                }
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(preloadBasicAuth, 1000);
        });
    </script>
</body>
</html>
