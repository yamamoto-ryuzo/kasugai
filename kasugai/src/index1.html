<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pane 1 - Portal Links</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        h1 {
            color: #1e3a8a;
            font-size: 20px;
            margin-top: 0;
            border-bottom: 2px solid #3b82f6;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .badge {
            display: inline-block;
            background-color: #3b82f6;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 15px;
            align-self: flex-start;
        }
        .link-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-grow: 1;
        }
        .portal-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 16px 20px;
            text-decoration: none;
            color: #1e293b;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.2s ease;
        }
        .portal-btn:hover {
            background-color: #eff6ff;
            border-color: #3b82f6;
            color: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 2px 4px rgba(59, 130, 246, 0.1);
        }
        .portal-btn .icon {
            font-size: 18px;
        }
        .footer {
            margin-top: auto;
            font-size: 11px;
            color: #64748b;
            text-align: center;
            border-top: 1px solid #f1f5f9;
            padding-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="badge">画面 1 / Portal</span>
        <h1>ポータルリンク</h1>
        
        <div class="link-list">
            <!-- Box へのリンク -->
            <a class="portal-btn" href="https://account.box.com/login" target="_blank">
                <span>📦 BOX</span>
                <span class="icon">↗</span>
            </a>
            
            <!-- Google へのリンク -->
            <a class="portal-btn" href="https://www.google.com" target="_blank">
                <span>🔍 Google</span>
                <span class="icon">↗</span>
            </a>
            
            <!-- Re:Earth へのリンク -->
            <a class="portal-btn" href="https://reearth.io/" target="_blank">
                <span>🌐 Re:Earth</span>
                <span class="icon">↗</span>
            </a>
        </div>
        
        <div class="footer">
            ※リンクをクリックすると外部ブラウザまたは新規タブで安全に開きます。
        </div>
    </div>

    <script>
        // --- スプリッターのドラッグ・リサイズ用中継処理 ---
        (function() {
            let isDragging = false;
            let activeSplitter = null;

            if (window.__TAURI__ && window.__TAURI__.event) {
                // 親がドラッグを開始したことを検知
                window.__TAURI__.event.listen('splitter_drag_start', (event) => {
                    isDragging = true;
                    activeSplitter = event.payload.activeSplitter;
                });

                // 親がドラッグを終了したことを検知
                window.__TAURI__.event.listen('splitter_drag_end', () => {
                    isDragging = false;
                    activeSplitter = null;
                });

                // ドラッグ中、マウスのグローバル座標を親に伝える
                window.addEventListener('mousemove', (e) => {
                    if (isDragging && activeSplitter) {
                        window.__TAURI__.event.emit('global_mousemove', {
                            screenX: e.screenX,
                            screenY: e.screenY
                        });
                    }
                });

                // ドラッグ中にこのペイン上でマウスを離した場合
                window.addEventListener('mouseup', () => {
                    if (isDragging) {
                        window.__TAURI__.event.emit('global_mouseup');
                    }
                });
            }
        })();
    </script>
</body>
</html>
