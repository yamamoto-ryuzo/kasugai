<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CesiumJS View</title>
    <!-- CesiumJS Resources -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.143/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.143/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        #cesiumContainer {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>

    <script>
        let cesiumViewer = null;

        async function initCesium() {
            window.CESIUM_BASE_URL = 'https://cesium.com/downloads/cesiumjs/releases/1.143/Build/Cesium/';

            // Rust側から設定（Ionトークン）を取得するためのプレースホルダ
            let cesiumToken = '';
            if (window.__TAURI__ && window.__TAURI__.core) {
                try {
                    cesiumToken = await window.__TAURI__.core.invoke('get_credential', { service: 'Kasugai_Cesium', username: 'ion_token' });
                } catch (e) {}
            }

            Cesium.Ion.defaultAccessToken = cesiumToken;

            cesiumViewer = new Cesium.Viewer('cesiumContainer', {
                baseLayerPicker: true,
                geocoder: true,
                navigationHelpButton: false,
                homeButton: true,
                sceneModePicker: true,
                timeline: false,
                animation: false,
                fullscreenButton: false,
                infoBox: false,
                selectionIndicator: false
            });

            cesiumViewer.imageryLayers.removeAll();
            Cesium.OpenStreetMapImageryProvider.fromUrl("https://a.tile.openstreetmap.org/").then(function(provider) {
                if (cesiumViewer) {
                    cesiumViewer.imageryLayers.addImageryProvider(provider);
                }
            }).catch(console.error);

            // URLハッシュ（位置情報）の解析と適用
            function applyHashLocation(isInitial) {
                const hash = window.location.hash;
                if (hash) {
                    const params = new URLSearchParams(hash.substring(1));
                    const lat = parseFloat(params.get('lat'));
                    const lon = parseFloat(params.get('lon'));
                    const zoom = parseFloat(params.get('zoom')) || 15;
                    if (!isNaN(lat) && !isNaN(lon)) {
                        const height = Math.pow(2, 27 - zoom);
                        if (isInitial) {
                            cesiumViewer.camera.setView({
                                destination: Cesium.Cartesian3.fromDegrees(lon, lat, height)
                            });
                        } else {
                            cesiumViewer.camera.flyTo({
                                destination: Cesium.Cartesian3.fromDegrees(lon, lat, height),
                                duration: 1.5
                            });
                        }
                    }
                }
            }

            // 初期位置の反映
            applyHashLocation(true);

            // ハッシュ変更時（外部からURLナビゲーションで新しい位置が指定されたとき）のカメラ移動
            window.addEventListener('hashchange', () => applyHashLocation(false));

            // 地図移動（カメラ移動終了）時にハッシュパラメータを更新し、Portal (Pane 1) からの位置取得を可能にする
            cesiumViewer.camera.moveEnd.addEventListener(() => {
                if (!cesiumViewer) return;
                const camera = cesiumViewer.camera;
                const position = camera.positionCartographic;
                const lat = Cesium.Math.toDegrees(position.latitude).toFixed(6);
                const lon = Cesium.Math.toDegrees(position.longitude).toFixed(6);
                const height = position.height;
                // 高度から簡易ズームレベルへの逆換算
                const zoom = Math.max(1, Math.min(20, Number(27 - Math.log2(height || 5000)))).toFixed(4);

                const newHash = `#lat=${lat}&lon=${lon}&zoom=${zoom}`;
                
                // 自分自身のURLハッシュを更新 (独立ウィンドウのハッシュが更新され、Portalはこれを get_pane2_url で直接参照します)
                window.history.replaceState(null, null, newHash);
            });

        }

        window.onload = initCesium;
    </script>
</body>
</html>
